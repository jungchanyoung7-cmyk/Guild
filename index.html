<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드용 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark-mode { background-color: #1a1a1a; color: #ffffff; }
        .dark-mode .card { background-color: #2d2d2d; border-color: #444; }
        .slot { aspect-ratio: 1 / 1; border: 2px dashed #ccc; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; background: rgba(255,255,255,0.1); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; font-size: 10px; text-align: center; }
        .formation-btn { border: 2px solid transparent; transition: all 0.2s; }
        .formation-btn.active { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); transform: scale(0.95); }
        .popup-card { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; padding: 20px; overflow-y: auto; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px; z-index: 40; }
        .dark-mode .mobile-nav { background: #2d2d2d; border-color: #444; }
        /* DeskTop vs Mobile */
        @media (min-width: 768px) {
            .main-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
            .mobile-nav { display: none; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="p-4 flex justify-between items-center bg-white shadow-sm dark:bg-zinc-900 sticky top-0 z-30">
        <h1 class="text-xl font-bold">이옌 길드전 가이드</h1>
        <button id="menuBtn" class="p-2 text-2xl">☰</button>
    </header>

    <div class="main-container p-4 pb-24">
        
        <section>
            <div class="mb-6">
                <h2 class="text-sm font-bold mb-3">진형 선택</h2>
                <div class="grid grid-cols-4 gap-2">
                    <button class="formation-btn active p-2 rounded bg-white dark:bg-zinc-800 shadow" onclick="setFormation('기본')">
                        <div class="text-[10px] text-gray-500">Lv.2</div>
                        <div class="font-bold">기본</div>
                    </button>
                    <button class="formation-btn p-2 rounded bg-white dark:bg-zinc-800 shadow" onclick="setFormation('밸런스')">
                        <div class="text-[10px] text-gray-500">Lv.1</div>
                        <div class="font-bold">밸런스</div>
                    </button>
                    <button class="formation-btn p-2 rounded bg-white dark:bg-zinc-800 shadow" onclick="setFormation('공격')">
                        <div class="text-[10px] text-gray-500">Lv.1</div>
                        <div class="font-bold">공격</div>
                    </button>
                    <button class="formation-btn p-2 rounded bg-white dark:bg-zinc-800 shadow" onclick="setFormation('보호')">
                        <div class="text-[10px] text-gray-500">Lv.10</div>
                        <div class="font-bold">보호</div>
                    </button>
                </div>
            </div>

            <div class="mb-6">
                <h2 class="text-sm font-bold mb-3">영웅 슬롯 (5개) & 펫</h2>
                <div class="grid grid-cols-3 md:grid-cols-6 gap-3">
                    <div class="slot" onclick="openPopup('hero', 0)" oncontextmenu="openDetail(0); return false;">
                        <span class="text-xs text-gray-400">영웅 1</span>
                        <div class="slot-label" id="hero-name-0">선택</div>
                    </div>
                    <div class="slot" onclick="openPopup('hero', 1)" oncontextmenu="openDetail(1); return false;">
                        <span class="text-xs text-gray-400">영웅 2</span>
                        <div class="slot-label" id="hero-name-1">선택</div>
                    </div>
                    <div class="slot" onclick="openPopup('hero', 2)" oncontextmenu="openDetail(2); return false;">
                        <span class="text-xs text-gray-400">영웅 3</span>
                        <div class="slot-label" id="hero-name-2">선택</div>
                    </div>
                    <div class="slot" onclick="openPopup('hero', 3)" oncontextmenu="openDetail(3); return false;">
                        <span class="text-xs text-gray-400">영웅 4</span>
                        <div class="slot-label" id="hero-name-3">선택</div>
                    </div>
                    <div class="slot" onclick="openPopup('hero', 4)" oncontextmenu="openDetail(4); return false;">
                        <span class="text-xs text-gray-400">영웅 5</span>
                        <div class="slot-label" id="hero-name-4">선택</div>
                    </div>
                    <div class="slot border-blue-400" onclick="openPopup('pet', 0)">
                        <span class="text-xs text-blue-400">PET</span>
                        <div class="slot-label" id="pet-name-0">선택</div>
                    </div>
                </div>
                <p class="text-[10px] mt-2 text-gray-400">* 영웅 슬롯 길게 누르면 상세 설정(스텟/장비)</p>
            </div>

            <div class="mb-6">
                <h2 class="text-sm font-bold mb-3">전술 스킬 (영웅 연동)</h2>
                <div class="flex gap-2">
                    <div class="w-16 h-16 slot" id="skill-slot-1"><div class="text-[10px]">스킬1</div></div>
                    <div class="w-16 h-16 slot" id="skill-slot-2"><div class="text-[10px]">스킬2</div></div>
                    <div class="w-16 h-16 slot" id="skill-slot-3"><div class="text-[10px]">스킬3</div></div>
                </div>
            </div>

            <div class="card p-4 rounded-xl bg-white shadow-md dark:bg-zinc-800">
                <h2 class="font-bold mb-4">덱 정보 입력</h2>
                <div class="space-y-4">
                    <input type="text" id="deckName" placeholder="덱 명칭 입력" class="w-full p-2 rounded border dark:bg-zinc-700">
                    <select id="deckType" class="w-full p-2 rounded border dark:bg-zinc-700">
                        <option value="공격덱">공격덱 (빨강)</option>
                        <option value="방어덱">방어덱 (노랑)</option>
                        <option value="카운터덱">카운터덱 (초록)</option>
                    </select>
                    <div class="flex gap-2">
                        <select id="deckTrait" class="flex-1 p-2 rounded border dark:bg-zinc-700">
                            <option value="내실">내실설정</option>
                            <option value="속공">속공</option>
                        </select>
                        <input type="number" id="speedValue" placeholder="속공수치" class="w-24 p-2 rounded border dark:bg-zinc-700">
                    </div>
                    <textarea id="deckTip" placeholder="공략 팁 입력" class="w-full p-2 rounded border dark:bg-zinc-700 h-24"></textarea>
                    
                    <div>
                        <label class="text-xs">카운터 설정</label>
                        <select id="counterSelect" class="w-full p-2 rounded border dark:bg-zinc-700">
                            <option value="">저장된 가이드덱 선택</option>
                        </select>
                    </div>

                    <button onclick="saveDeck()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">가이드덱 저장</button>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">가이드덱 리스트</h2>
                <select onchange="filterList(this.value)" class="text-sm p-1 rounded border dark:bg-zinc-700">
                    <option value="전체">전체보기</option>
                    <option value="공격덱">공격덱</option>
                    <option value="방어덱">방어덱</option>
                    <option value="카운터덱">카운터덱</option>
                </select>
            </div>
            <div id="deckList" class="space-y-4">
                <div class="text-center text-gray-400 py-10">저장된 데이터가 없습니다.</div>
            </div>
        </section>
    </div>

    <div id="selectionPopup" class="popup-card">
        <div class="bg-white dark:bg-zinc-800 rounded-2xl p-4 max-w-md mx-auto h-full overflow-y-auto">
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-inherit py-2">
                <h3 id="popupTitle" class="font-bold">항목 선택</h3>
                <button onclick="closePopup()" class="text-2xl">&times;</button>
            </div>
            <input type="text" id="searchInput" oninput="filterSearch(this.value)" placeholder="이름으로 검색..." class="w-full p-2 mb-4 border rounded dark:bg-zinc-700">
            <div id="itemContainer" class="grid-layout">
                </div>
        </div>
    </div>

    <div id="detailPopup" class="popup-card">
        <div class="bg-white dark:bg-zinc-800 rounded-2xl p-6 max-w-md mx-auto">
            <h3 class="font-bold mb-4">영웅 상세 상세설정</h3>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-[10px] block">장비 (2x2)</label>
                    <div class="grid grid-cols-2 gap-1">
                        <div class="slot h-12" onclick="openPopup('item', 'w1')"></div>
                        <div class="slot h-12" onclick="openPopup('item', 'w2')"></div>
                        <div class="slot h-12" onclick="openPopup('item', 'a1')"></div>
                        <div class="slot h-12" onclick="openPopup('item', 'a2')"></div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] block">장신구 (1)</label>
                    <div class="slot h-12" onclick="openPopup('acc', 'acc1')"></div>
                </div>
            </div>
            <div class="space-y-2 text-sm overflow-y-auto max-h-60">
                <div class="flex justify-between"><span>공격력</span><input type="number" class="w-20 border rounded px-1 dark:bg-zinc-700"></div>
                <div class="flex justify-between"><span>방어력</span><input type="number" class="w-20 border rounded px-1 dark:bg-zinc-700"></div>
                <div class="flex justify-between"><span>생명력</span><input type="number" class="w-20 border rounded px-1 dark:bg-zinc-700"></div>
                <div class="flex justify-between"><span>속공</span><input type="number" class="w-20 border rounded px-1 dark:bg-zinc-700"></div>
                </div>
            <button onclick="closeDetail()" class="w-full mt-4 bg-gray-800 text-white py-2 rounded">닫기 및 적용</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBObWW-nQdRW7B_HB9O5lmCJFoVRUm-Ijs",
            authDomain: "guid-3755d.firebaseapp.com",
            databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "guid-3755d",
            storageBucket: "guid-3755d.firebasestorage.app",
            messagingSenderId: "397986674872",
            appId: "1:397986674872:web:71ec328badbbedc6d4dc4d",
            measurementId: "G-1BFM3PXK0P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 데이터베이스 기초자료
        const heroData = {
            "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
            "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
            "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
            "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
            "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
            "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
            "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
            "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
        };
        const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
        const itemData = {
            "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
            "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"]
        };

        const GITHUB_BASE = "https://raw.githubusercontent.com/jungchanyoung7-cmyk/Guild/main/public/도감/";

        let currentSelection = { type: '', slotIndex: null };
        let selectedDeckData = {
            formation: '기본',
            heroes: [null, null, null, null, null],
            pet: null
        };

        // 전역 함수 연결
        window.openPopup = (type, index) => {
            currentSelection = { type, index };
            document.getElementById('selectionPopup').style.display = 'block';
            renderSelectionItems(type);
        };

        window.closePopup = () => {
            document.getElementById('selectionPopup').style.display = 'none';
        };

        function renderSelectionItems(type) {
            const container = document.getElementById('itemContainer');
            container.innerHTML = '';
            let list = [];
            let path = '';

            if (type === 'hero') {
                Object.keys(heroData).forEach(cat => list.push(...heroData[cat]));
                path = "캐릭터 아이콘 모음/";
            } else if (type === 'pet') {
                list = petList;
                path = "펫 아이콘 모음/";
            } else if (type === 'item') {
                list = itemData.장비;
                path = "장비/";
            } else if (type === 'acc') {
                list = itemData.장신구;
                path = "장신구/";
            }

            list.forEach(name => {
                const item = document.createElement('div');
                item.className = "text-center cursor-pointer p-1 hover:bg-gray-100 rounded";
                item.innerHTML = `
                    <div class="w-full aspect-square bg-gray-200 rounded-lg mb-1 overflow-hidden flex items-center justify-center text-[10px]">
                        <img src="${GITHUB_BASE}${path}${name}.png" onerror="this.src='https://via.placeholder.com/80?text=${name}'">
                    </div>
                    <div class="text-[10px] truncate">${name}</div>
                `;
                item.onclick = () => selectItem(name, `${GITHUB_BASE}${path}${name}.png`);
                container.appendChild(item);
            });
        }

        function selectItem(name, imgUrl) {
            const { type, index } = currentSelection;
            if (type === 'hero') {
                selectedDeckData.heroes[index] = name;
                document.getElementById(`hero-name-${index}`).innerText = name;
                // 스킬 연동 로직 (영웅명-2 등)
                if (index === 0) updateSkills(name);
            } else if (type === 'pet') {
                selectedDeckData.pet = name;
                document.getElementById(`pet-name-0`).innerText = name;
            }
            closePopup();
        }

        function updateSkills(heroName) {
            // 메인 영웅 스킬 3개 표시 로직
            const skillPath = "캐릭터 스킬 모음/";
            for(let i=1; i<=3; i++) {
                const slot = document.getElementById(`skill-slot-${i}`);
                slot.innerHTML = `<img src="${GITHUB_BASE}${skillPath}${heroName}-${i+1}.png" onerror="this.parentElement.innerHTML='<div class=\'text-[8px]\'>${heroName}(위/아래)</div>'">`;
            }
        }

        window.setFormation = (f) => {
            selectedDeckData.formation = f;
            document.querySelectorAll('.formation-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(f)) btn.classList.add('active');
            });
        };

        // 저장 로직
        window.saveDeck = () => {
            const deckName = document.getElementById('deckName').value;
            if(!deckName) return alert("덱 명칭을 입력하세요.");

            const newDeck = {
                ...selectedDeckData,
                name: deckName,
                type: document.getElementById('deckType').value,
                trait: document.getElementById('deckTrait').value,
                speed: document.getElementById('speedValue').value,
                tip: document.getElementById('deckTip').value,
                timestamp: Date.now()
            };

            const deckRef = ref(db, 'decks');
            push(deckRef, newDeck).then(() => {
                alert("가이드덱이 성공적으로 저장되었습니다.");
                location.reload();
            });
        };

        // 실시간 리스트 업데이트
        onValue(ref(db, 'decks'), (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('deckList');
            const counterSelect = document.getElementById('counterSelect');
            listContainer.innerHTML = '';
            
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const deck = data[key];
                    const color = deck.type === '공격덱' ? 'bg-red-500' : deck.type === '방어덱' ? 'bg-yellow-500' : 'bg-green-500';
                    
                    const card = document.createElement('div');
                    card.className = "card p-4 rounded-xl bg-white shadow-sm dark:bg-zinc-800 border-l-4 " + (deck.type === '공격덱' ? 'border-red-500' : deck.type === '방어덱' ? 'border-yellow-500' : 'border-green-500');
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="${color} text-white text-[10px] px-2 py-0.5 rounded">${deck.type}</span>
                            <span class="text-xs text-gray-400">${deck.trait} ${deck.speed || ''}</span>
                        </div>
                        <h3 class="font-bold">${deck.name}</h3>
                        <div class="flex gap-1 my-2">
                            ${deck.heroes.map(h => `<div class="w-8 h-8 bg-gray-100 rounded overflow-hidden"><img src="${GITHUB_BASE}캐릭터 아이콘 모음/${h}.png" onerror="this.src='https://via.placeholder.com/32?text=?'"></div>`).join('')}
                            <div class="w-8 h-8 border border-blue-200 rounded overflow-hidden"><img src="${GITHUB_BASE}펫 아이콘 모음/${deck.pet}.png" onerror="this.src='https://via.placeholder.com/32?text=P'"></div>
                        </div>
                        <button class="text-xs text-blue-500" onclick="alert('전체 상세 팝업 준비중...')">상세보기 & 카운터 비교</button>
                    `;
                    listContainer.appendChild(card);
                    
                    // 카운터 선택 리스트 추가
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.text = deck.name;
                    counterSelect.appendChild(opt);
                });
            }
        });

        // 테마 설정
        document.getElementById('menuBtn').onclick = () => {
            document.body.classList.toggle('dark-mode');
        };

    </script>
</body>
</html>
