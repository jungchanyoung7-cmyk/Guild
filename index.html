<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드 - COLOR EDITION</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { 
            --bg: #0c1221; --card: #161b2d; --blue: #3b82f6; --purple: #8b5cf6; 
            --border: #2a2f3f; --text: #ffffff; --input: #1a1f2e; --red: #ef4444; --green: #10b981; --gold: #ffd700;
            --type-atk: #ef4444; --type-def: #ffd700; --type-cnt: #10b981; 
        }
        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --blue: #2563eb; --purple: #7c3aed;
            --border: #e5e7eb; --text: #1f2937; --input: #f9fafb; --red: #dc2626; --green: #059669; --gold: #d97706;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 10px; min-height: 100vh; padding-bottom: 120px; transition: background 0.3s; }

        .top-bar { position: relative; width: 100%; height: 90px; margin-bottom: 20px; border-radius: 20px; overflow: hidden; display: flex; justify-content: space-between; align-items: flex-end; padding: 15px 20px; }
        .top-bar::before { content: ""; position: absolute; inset: 0; background-image: url('image_0.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.25; mix-blend-mode: color-dodge; z-index: 1; }
        .guild-title { position: relative; z-index: 2; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.7), 0 0 20px var(--gold); letter-spacing: -1px; }
        .made-by { position: relative; z-index: 2; font-size: 11px; color: #ccc; font-style: italic; opacity: 0.8; }

        .formation-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .f-btn { padding: 12px 20px; background: var(--card); border: 1px solid var(--border); color: #777; border-radius: 12px; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }

        .deck-board { position: relative; width: 100%; height: 440px; background: var(--card); border-radius: 35px; border: 2px solid var(--border); margin-bottom: 20px; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.7); }
        .slot-container { position: absolute; width: 70px; height: 70px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .slot-num { position: absolute; top: -14px; left: -10px; z-index: 100; font-weight: 900; font-size: 22px; text-shadow: 2px 2px 5px #000; }
        .num-blue { color: var(--blue); } .num-red { color: var(--red); }   

        .slot { width: 100%; height: 100%; border-radius: 16px; border: 2px solid var(--border); overflow: hidden; background: rgba(255,255,255,0.02); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
        .slot.has-hero { border-color: var(--purple); box-shadow: 0 0 12px rgba(139, 92, 246, 0.4); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

        .right-panel { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 200; }
        .pet-circle { width: 70px; height: 70px; border: 3px solid var(--purple); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(12px); }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; border-radius: 35px; padding: 25px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--purple); position: relative; }
        
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .detail-item { background: var(--input); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .detail-label { font-size: 11px; color: var(--purple); font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }

        .save-panel { background: var(--card); padding: 22px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; flex-direction: column; gap: 14px; }
        #save-btn { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; padding: 18px; border: none; border-radius: 16px; font-size: 17px; font-weight: 900; cursor: pointer; }

        .filter-btn.active { background: var(--purple); color: #fff; }
    </style>
</head>
<body class="dark-mode">
    <div class="top-bar">
        <div class="guild-title">이옌 길드</div> <div class="made-by">By 시원 (jungchanyoung7-cmyk)</div>
    </div>

    <div class="formation-bar" id="f-bar">
        <button class="f-btn active" onclick="setF('기본')">🛡️ 기본 진형</button>
        <button class="f-btn" onclick="setF('밸런스')">⚖️ 밸런스 진형</button>
        <button class="f-btn" onclick="setF('공격')">⚔️ 공격 진형</button>
        <button class="f-btn" onclick="setF('보호')">💎 보호 진형</button>
    </div>

    <div class="deck-board">
        <div class="right-panel">
            <div class="pet-circle" onclick="openPet()"><div id="pet-slot-view"></div></div>
        </div>
        <div id="slots-area"></div>
    </div>

    <div class="save-panel">
        <input type="text" id="d-name" placeholder="가이드 덱 명칭">
        <textarea id="d-tip" rows="2" placeholder="운영 핵심 팁을 입력하세요..."></textarea>
        <button id="save-btn" onclick="saveToDB()">💾 가이드 데이터 저장</button>
    </div>

    <div id="deck-list"></div>

    <div id="modal" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="m-title" style="color:var(--purple)">선택</h3>
                <button onclick="closeM()" style="background:none; border:none; color:#888; font-size:28px;">&times;</button>
            </div>
            <div id="m-body"></div>
        </div>
    </div>

<script>
    const USER_ID = "jungchanyoung7-cmyk"; 
    const BASE_PATH = `https://raw.githubusercontent.com/${USER_ID}/Guild/main/public`;
    const ROOT_PATH = `${BASE_PATH}/${encodeURIComponent('도감')}`;

    const heroData = {
        "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
        "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스"],
        "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
        "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
        "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
        "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
        "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
        "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
    };

    const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];

    const itemData = {
        "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
        "장신구": [
            "가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", 
            "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", 
            "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", 
            "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", 
            "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"
        ]
    };

    let deck = [null, null, null, null, null]; 
    let pet = ""; 
    let formation = '기본'; 
    let curSlot = 0;
    let pressTimer;

    function init() {
        const area = document.getElementById('slots-area');
        area.innerHTML = "";
        for(let i=0; i<5; i++) {
            area.innerHTML += `
                <div class="slot-container" id="wrap-${i}">
                    <div class="slot-num" id="num-${i}">${i+1}</div>
                    <div class="slot" id="s-${i}" 
                         onmousedown="startPress(${i})" onmouseup="endPress()" 
                         ontouchstart="startPress(${i})" ontouchend="endPress()"
                         onclick="handleQuickClick(${i})">
                    </div>
                </div>`;
        }
        setF('기본'); updateUI();
    }

    function startPress(i) { pressTimer = setTimeout(() => openDetail(i), 800); }
    function endPress() { clearTimeout(pressTimer); }

    function handleQuickClick(i) {
        if(!deck[i]) openHero(i);
        else {
            if(confirm(`${deck[i].name}을(를) 해제하시겠습니까?`)) {
                deck[i] = null; updateUI();
            }
        }
    }

    function openHero(i) {
        curSlot = i;
        document.getElementById('m-title').innerText = "영웅 선택";
        let tabs = Object.keys(heroData).map(t => `<button onclick="renderHeroItems('${t}')" style="padding:10px; margin:3px; background:var(--input); color:#fff; border-radius:8px; border:1px solid var(--border); font-size:12px;">${t}</button>`).join('');
        document.getElementById('m-body').innerHTML = `<div style="overflow-x:auto; white-space:nowrap; margin-bottom:15px;">${tabs}</div><div id="m-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>`;
        renderHeroItems('스페셜');
        document.getElementById('modal').style.display='flex';
    }

    function renderHeroItems(t) {
        document.getElementById('m-grid').innerHTML = heroData[t].map(n => `
            <div class="slot" style="height:80px;" onclick="selectHero('${n}')">${getSlotHTML(n, 'hero')}</div>
        `).join('');
    }

    function selectHero(name) {
        deck[curSlot] = { name, gear: "선택안함", ring: "선택안함", atk: "", spd: "" };
        updateUI(); closeM();
    }

    function openDetail(i) {
        if(!deck[i]) return;
        curSlot = i;
        const h = deck[i];
        document.getElementById('m-title').innerText = `${h.name} 상세 정보`;
        document.getElementById('m-body').innerHTML = `
            <div style="display:flex; justify-content:center; margin-bottom:20px;">
                <div class="slot" style="width:100px; height:100px; border-radius:20px;">${getSlotHTML(h.name, 'hero')}</div>
            </div>
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label">무기/방어구</div>
                    <select onchange="deck[${i}].gear=this.value">
                        <option value="선택안함">선택안함</option>
                        ${itemData.장비.map(g=>`<option value="${g}" ${h.gear===g?'selected':''}>${g}</option>`).join('')}
                    </select>
                </div>
                <div class="detail-item"><div class="detail-label">장신구(반지)</div>
                    <select onchange="deck[${i}].ring=this.value">
                        <option value="선택안함">선택안함</option>
                        ${itemData.장신구.map(r=>`<option value="${r}" ${h.ring===r?'selected':''}>${r}</option>`).join('')}
                    </select>
                </div>
                <div class="detail-item"><div class="detail-label">공격력/마법력</div>
                    <input type="number" value="${h.atk}" oninput="deck[${i}].atk=this.value" placeholder="예: 45000">
                </div>
                <div class="detail-item"><div class="detail-label">목표 속공</div>
                    <input type="number" value="${h.spd}" oninput="deck[${i}].spd=this.value" placeholder="예: 95">
                </div>
            </div>
            <button onclick="closeM()" style="width:100%; margin-top:20px; padding:18px; background:var(--purple); color:#fff; border:none; border-radius:15px; font-weight:900;">저장 및 닫기</button>
        `;
        document.getElementById('modal').style.display='flex';
    }

    function getSlotHTML(name, type) {
        if(!name) return "";
        let folder = "";
        let ext = ".png";

        if(type === 'hero') folder = '캐릭터 아이콘 모음';
        else if(type === 'pet') folder = '펫 아이콘 모음';
        else if(type === 'item') { folder = '장신구'; ext = ".jpg"; } // 반지는 jpg

        let finalUrl = `${ROOT_PATH}/${encodeURIComponent(folder)}/${encodeURIComponent(name)}${ext}`;
        return `<img src="${finalUrl}" class="hero-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div class="no-img-text" style="display:none; font-size:10px; color:#555;">${name}</div>`;
    }

    function updateUI() {
        deck.forEach((h, i) => {
            const s = document.getElementById('s-' + i);
            s.innerHTML = h ? getSlotHTML(h.name, 'hero') : "";
            s.classList.toggle('has-hero', !!h);
        });
        document.getElementById('pet-slot-view').innerHTML = pet ? getSlotHTML(pet, 'pet') : "";
    }

    function setF(n) {
        formation = n;
        const POS = { 
            '기본': [{x:135,y:250},{x:135,y:130},{x:25,y:320},{x:25,y:200},{x:25,y:80}],
            '밸런스': [{x:135,y:310},{x:135,y:195},{x:135,y:80},{x:25,y:260},{x:25,y:145}],
            '공격': [{x:135,y:200},{x:25,y:335},{x:25,y:245},{x:25,y:155},{x:25,y:65}],
            '보호': [{x:135,y:335},{x:135,y:245},{x:135,y:155},{x:135,y:65},{x:25,y:200}]
        };
        POS[n].forEach((p, i) => {
            const el = document.getElementById(`wrap-${i}`);
            el.style.left = p.x + 'px'; el.style.top = p.y + 'px';
        });
        document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(n)));
    }

    function openPet() {
        document.getElementById('m-title').innerText = "펫 선택";
        let grid = petList.map(n => `<div class="slot" style="height:70px; border-radius:50%;" onclick="pet='${n}'; updateUI(); closeM();">${getSlotHTML(n, 'pet')}</div>`).join('');
        document.getElementById('m-body').innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">${grid}</div>`;
        document.getElementById('modal').style.display='flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function saveToDB() { alert("전체 가이드 데이터가 상세 능력치와 함께 저장되었습니다."); }

    window.onload = init;
</script>
</body>
</html>
