<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드 - FULL STRATEGY</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { 
            --bg: #0c1221; --card: #161b2d; --blue: #3b82f6; --purple: #8b5cf6; 
            --border: #2a2f3f; --text: #ffffff; --input: #1a1f2e; --red: #ef4444; --green: #10b981; --gold: #ffd700;
            --atk-bg: #2d1616; --def-bg: #162d1d; --cnt-bg: #2d2616;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 12px; min-height: 100vh; }

        /* 상단 바 및 진형 버튼 */
        .top-bar { width: 100%; height: 50px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .guild-title { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--gold); }
        .formation-bar { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .f-btn { padding: 8px 14px; background: var(--card); border: 1px solid var(--border); color: #888; border-radius: 8px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* 메인 덱 보드 */
        .deck-board { position: relative; width: 100%; height: 400px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .slot-container { position: absolute; width: 72px; height: 72px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .slot-num { position: absolute; top: -10px; left: -6px; z-index: 100; font-weight: 900; font-size: 18px; text-shadow: 1px 1px 3px #000; }
        .num-blue { color: var(--blue); } .num-red { color: var(--red); }   

        .slot { width: 100%; height: 100%; border-radius: 12px; border: 2px solid var(--border); overflow: hidden; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .slot.selected { border-color: var(--purple); box-shadow: 0 0 12px var(--purple); transform: scale(1.05); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .no-img-box { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--input); color: #fff; font-size: 10px; font-weight: bold; text-align: center; padding: 4px; }

        /* 우측 패널 (펫/스킬) */
        .right-panel { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .pet-circle { width: 60px; height: 60px; border: 3px solid var(--purple); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; position: relative; }
        .skill-list-box { width: 95px; padding: 8px 4px; border: 2px solid var(--purple); border-radius: 12px; background: rgba(139,92,246,0.1); cursor: pointer; }
        .sk-slots { display: flex; justify-content: center; gap: 3px; margin-top: 5px; }
        .sk-mini-box { width: 28px; height: 28px; background: #000; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* 저장 및 설정 패널 */
        .save-panel { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; background: var(--input); color: var(--text); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; outline: none; font-size: 12px; }
        #save-btn { background: var(--blue); color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; }

        /* 리스트 아이템 */
        .list-item { padding: 12px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; position: relative; }
        .list-item.공격 { border-left: 5px solid var(--red); background: linear-gradient(90deg, var(--atk-bg), var(--card)); }
        .list-item.방어 { border-left: 5px solid var(--green); background: linear-gradient(90deg, var(--def-bg), var(--card)); }
        .list-item.카운터 { border-left: 5px solid var(--gold); background: linear-gradient(90deg, var(--cnt-bg), var(--card)); }

        /* 모달 및 필터 UI */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 18px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--purple); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .search-bar { width: 100%; padding: 10px; background: var(--input); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 10px; }
        .tab-box { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; }
        .tab-item { padding: 6px 10px; background: var(--input); border-radius: 6px; font-size: 11px; white-space: nowrap; cursor: pointer; color: #888; border: 1px solid var(--border); }
        .tab-item.active { background: var(--purple); color: #fff; border-color: var(--purple); }
        .grid-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

        /* 즐겨찾기 별 */
        .fav-star { position: absolute; top: 2px; right: 2px; color: rgba(255,255,255,0.2); font-size: 14px; z-index: 5; }
        .fav-star.active { color: var(--gold); }

        /* 속공 슬라이더 */
        .speed-range { width: 100%; height: 30px; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="guild-title">이옌 길드</div>
        <div style="font-size:20px;">☰</div>
    </div>

    <div class="formation-bar">
        <button class="f-btn active" onclick="setF('기본')">🛡️ 기본</button>
        <button class="f-btn" onclick="setF('밸런스')">⚖️ 밸런스</button>
        <button class="f-btn" onclick="setF('공격')">⚔️ 공격</button>
        <button class="f-btn" onclick="setF('보호')">💎 보호</button>
    </div>

    <div class="deck-board">
        <div class="right-panel">
            <div class="pet-circle" onclick="openPet()" id="pet-slot-view"></div>
            <div class="skill-list-box" onclick="openSkill()" id="sk-slots-view"></div>
        </div>
        <div id="slots-area"></div>
    </div>

    <div class="save-panel">
        <div class="option-grid">
            <select id="d-type" onchange="checkCounter(this.value)">
                <option value="공격">⚔️ 공격덱</option>
                <option value="방어">🛡️ 방어덱</option>
                <option value="카운터">🔥 카운터덱</option>
            </select>
            <select id="d-style" onchange="checkSpeedModal(this.value)">
                <option value="내실">💎 내실 위주</option>
                <option value="속공">⚡ 속공 위주</option>
            </select>
        </div>
        <select id="d-target" style="display:none; border-color:var(--gold);"></select>
        <input type="text" id="d-name" placeholder="가이드 덱 이름">
        <textarea id="d-tip" rows="2" placeholder="운영 팁 입력..."></textarea>
        <button id="save-btn" onclick="saveToDB()">💾 전략 가이드 저장</button>
    </div>

    <div id="deck-list"></div>

    <div id="modal" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-container"></div>
            <button onclick="closeM()" style="width:100%; margin-top:15px; padding:12px; background:var(--border); border:none; border-radius:10px; color:#fff; font-weight:bold;">닫기</button>
        </div>
    </div>

<script>
    const USER_ID = "jungchanyoung7-cmyk"; 
    const BASE_URL = `https://raw.githubusercontent.com/${USER_ID}/Guild/main/public/%EB%8F%84%EA%B0%90`;

    // 영웅 데이터 (590라인의 핵심 리스트 - 절대 생략 금지)
    const heroData = {
        "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
        "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
        "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
        "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
        "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
        "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
        "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
        "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
    };
    const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
    
    let deck = [null, null, null, null, null];
    let skills = [];
    let pet = "";
    let speedVal = 0;
    let formation = '기본';
    let curSlot = 0;
    let favHeroes = JSON.parse(localStorage.getItem('FAV_HEROES') || '[]');
    let favPets = JSON.parse(localStorage.getItem('FAV_PETS') || '[]');

    function init() {
        const area = document.getElementById('slots-area');
        area.innerHTML = "";
        for(let i=0; i<5; i++) { area.innerHTML += `<div class="slot-container" id="wrap-${i}"><div class="slot-num" id="num-${i}">${i+1}</div><div class="slot" id="s-${i}" onclick="handleSlot(${i})"></div></div>`; }
        setF('기본'); renderList(); updateUI();
    }

    function handleSlot(i) {
        if(!deck[i]) { curSlot = i; openHero(); }
        else { if(confirm('해제할까요?')) { deck[i] = null; updateUI(); } }
    }

    function getSlotHTML(name, type='hero', sIdx=null) {
        if(!name) return "";
        let folder = type === 'hero' ? "캐릭터%20아이콘%20모음" : type === 'pet' ? "펫%20아이콘%20모음" : "캐릭터%20스킬%20모음";
        let fileName = sIdx ? `${name}-${sIdx}` : name;
        const png = `${BASE_URL}/${folder}/${encodeURIComponent(fileName)}.png`;
        const jpg = `${BASE_URL}/${folder}/${encodeURIComponent(fileName)}.jpg`;
        return `<img src="${png}" class="hero-img" onerror="this.onerror=null; this.src='${jpg}'; this.nextElementSibling.style.display='flex';"><div class="no-img-box" style="display:none;">${name}${sIdx?'-'+sIdx:''}</div>`;
    }

    function updateUI() {
        deck.forEach((h, i)=> { document.getElementById('s-'+i).innerHTML = h ? getSlotHTML(h.name) : ""; });
        document.getElementById('pet-slot-view').innerHTML = getSlotHTML(pet, 'pet');
        document.getElementById('sk-slots-view').innerHTML = skills.map(s => `<div class="sk-mini-box">${getSlotHTML(s.n, 'skill', s.v)}</div>`).join('') + '<div class="sk-mini-box"></div>'.repeat(3 - skills.length);
    }

    // 속공 모달
    function checkSpeedModal(val) {
        if(val === '속공') {
            document.getElementById('modal-container').innerHTML = `<div style="text-align:center;"><h3>⚡ 속공 수치 설정</h3><h1 style="font-size:40px; color:var(--purple); margin:15px 0;" id="sp-view">${speedVal}</h1><input type="range" class="speed-range" min="0" max="150" value="${speedVal}" oninput="speedVal=this.value; document.getElementById('sp-view').innerText=this.value;"></div>`;
            document.getElementById('modal').style.display = 'flex';
        }
    }

    // 영웅 선택 (필터 + 즐겨찾기 통합)
    function openHero() {
        renderHeroContent('★ 즐겨찾기');
        document.getElementById('modal').style.display = 'flex';
    }

    function renderHeroContent(cat, filter = "") {
        let cats = ['★ 즐겨찾기', ...Object.keys(heroData)];
        let html = `<div class="modal-header"><h3>영웅 배치</h3></div><input type="text" class="search-bar" placeholder="이름 검색..." oninput="renderHeroContent('${cat}', this.value)" value="${filter}"><div class="tab-box">`;
        cats.forEach(c => html += `<div class="tab-item ${cat===c?'active':''}" onclick="renderHeroContent('${c}')">${c}</div>`);
        html += `</div><div class="grid-list">`;
        
        let list = (cat === '★ 즐겨찾기') ? favHeroes : heroData[cat];
        if(filter) list = Object.values(heroData).flat().filter(n => n.includes(filter));

        [...new Set(list)].forEach(n => {
            html += `<div class="slot" style="height:62px; position:relative;" onclick="selH('${n}')">${getSlotHTML(n)}<span class="fav-star ${favHeroes.includes(n)?'active':''}" onclick="event.stopPropagation(); toggleFav('${n}')">★</span></div>`;
        });
        document.getElementById('modal-container').innerHTML = html + `</div>`;
    }

    function toggleFav(n) {
        if(favHeroes.includes(n)) favHeroes = favHeroes.filter(x => x !== n);
        else favHeroes.push(n);
        localStorage.setItem('FAV_HEROES', JSON.stringify(favHeroes));
        const activeTab = document.querySelector('.tab-item.active').innerText;
        const filter = document.querySelector('.search-bar').value;
        renderHeroContent(activeTab, filter);
    }

    function selH(n) { deck[curSlot] = {name:n}; updateUI(); closeM(); }

    // 펫 선택 (필터 적용)
    function openPet() {
        let html = `<div class="modal-header"><h3>펫 선택</h3></div><input type="text" class="search-bar" placeholder="펫 이름 검색..." oninput="filterPet(this.value)"><div class="grid-list" id="pet-grid">`;
        petList.forEach(n => html += `<div class="slot" style="height:60px; border-radius:50%;" onclick="pet='${n}'; updateUI(); closeM();">${getSlotHTML(n, 'pet')}</div>`);
        document.getElementById('modal-container').innerHTML = html + `</div>`;
        document.getElementById('modal').style.display = 'flex';
    }
    function filterPet(val) {
        document.getElementById('pet-grid').innerHTML = petList.filter(n => n.includes(val)).map(n => `<div class="slot" style="height:60px; border-radius:50%;" onclick="pet='${n}'; updateUI(); closeM();">${getSlotHTML(n, 'pet')}</div>`).join('');
    }

    // 스킬 선택 (강조 + 자동 닫힘)
    function openSkill() {
        const actives = deck.filter(h=>h);
        if(!actives.length) return alert("영웅을 배치하세요.");
        let html = `<h3 style="margin-bottom:15px; text-align:center;">스킬 순서 (3개)</h3><div class="grid-list" style="grid-template-columns: 1fr 1fr;">`;
        actives.forEach(h => {
            [2, 3].forEach(v => {
                const isSel = skills.some(s => s.n === h.name && s.v === v);
                html += `<div class="slot ${isSel?'selected':''}" style="height:70px;" onclick="toggleSk('${h.name}',${v}, this)">${getSlotHTML(h.name, 'skill', v)}</div>`;
            });
        });
        document.getElementById('modal-container').innerHTML = html + `</div>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function toggleSk(n, v, el) {
        const idx = skills.findIndex(s => s.n === n && s.v === v);
        if(idx > -1) { skills.splice(idx, 1); el.classList.remove('selected'); }
        else {
            if(skills.length < 3) {
                skills.push({n, v}); el.classList.add('selected');
                if(skills.length === 3) { setTimeout(() => { updateUI(); closeM(); }, 300); }
            }
        }
        updateUI();
    }

    function setF(n) {
        const POS = {
            '기본': [{x:125,y:210,c:'blue'},{x:125,y:100,c:'blue'},{x:25,y:280,c:'red'},{x:25,y:170,c:'red'},{x:25,y:60,c:'red'}],
            '밸런스': [{x:125,y:270,c:'blue'},{x:125,y:165,c:'blue'},{x:125,y:60,c:'blue'},{x:25,y:215,c:'red'},{x:25,y:110,c:'red'}],
            '공격': [{x:125,y:165,c:'blue'},{x:25,y:290,c:'red'},{x:25,y:210,c:'red'},{x:25,y:130,c:'red'},{x:25,y:50,c:'red'}],
            '보호': [{x:125,y:290,c:'blue'},{x:125,y:210,c:'blue'},{x:125,y:130,c:'blue'},{x:125,y:50,c:'blue'},{x:25,y:170,c:'red'}]
        };
        formation = n;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(n)));
        POS[n].forEach((p, i) => { 
            const el = document.getElementById(`wrap-${i}`); 
            el.style.left = p.x+'px'; el.style.top = p.y+'px'; 
            document.getElementById(`num-${i}`).className = `slot-num num-${p.c}`; 
        });
    }

    function saveToDB() {
        const name = document.getElementById('d-name').value;
        if(!name) return alert("이름 입력!");
        const data = { id: Date.now(), name, type: document.getElementById('d-type').value, style: document.getElementById('d-style').value, speed: speedVal, tip: document.getElementById('d-tip').value, deck: JSON.parse(JSON.stringify(deck)), skills: [...skills], pet, formation };
        let db = JSON.parse(localStorage.getItem('SENA_DECKS') || '[]');
        db.unshift(data);
        localStorage.setItem('SENA_DECKS', JSON.stringify(db));
        renderList(); alert("저장됨!");
    }

    function renderList() {
        const db = JSON.parse(localStorage.getItem('SENA_DECKS') || '[]');
        document.getElementById('deck-list').innerHTML = db.map(d => `<div class="list-item ${d.type}" onclick="loadD(${d.id})"><b>${d.name}</b> (${d.style} ${d.speed||0})<button onclick="event.stopPropagation(); delD(${d.id})" style="float:right; color:red; border:none; background:none;">삭제</button></div>`).join('');
    }

    function loadD(id) {
        const d = JSON.parse(localStorage.getItem('SENA_DECKS')).find(i => i.id === id);
        deck=d.deck; skills=d.skills; pet=d.pet; formation=d.formation; speedVal=d.speed||0; setF(d.formation); updateUI();
    }
    function delD(id) { if(confirm('삭제?')) { let db = JSON.parse(localStorage.getItem('SENA_DECKS')).filter(i=>i.id!==id); localStorage.setItem('SENA_DECKS', JSON.stringify(db)); renderList(); } }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function checkCounter(v) { /* 상성로직 */ }

    window.onload = init;
</script>
</body>
</html>
