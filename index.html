<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드용 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --red: #ff4d4d; --blue: #3b82f6; --yellow: #ffcc00; --green: #4ade80; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Pretendard', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 진형 좌표 */
        .slot { position: absolute; width: 75px; height: 110px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .slot-img { width: 64px; height: 64px; background: #222; border: 2px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .x-mark { background: rgba(0,0,0,0.8); border: 2px dashed #333; color: #444; pointer-events: none; }

        .f-basic .s1 { top: 40px; right: 25px; } .f-basic .s2 { top: 140px; right: 25px; }
        .f-basic .s3 { top: 10px; left: 25px; } .f-basic .s4 { top: 90px; left: 25px; } .f-basic .s5 { top: 170px; left: 25px; }
        .f-balance .s1 { top: 10px; right: 25px; } .f-balance .s2 { top: 90px; right: 25px; } .f-balance .s3 { top: 170px; right: 25px; }
        .f-balance .s4 { top: 40px; left: 25px; } .f-balance .s5 { top: 140px; left: 25px; }
        .f-attack .s1 { top: 90px; right: 40px; } .f-attack .s2 { top: 0px; left: 25px; } .f-attack .s3 { top: 60px; left: 25px; } .f-attack .s4 { top: 120px; left: 25px; } .f-attack .s5 { top: 180px; left: 25px; }
        .f-protect .s1 { top: 0px; right: 25px; } .f-protect .s2 { top: 60px; right: 25px; } .f-protect .s3 { top: 120px; right: 25px; } .f-protect .s4 { top: 180px; right: 25px; } .f-protect .s5 { top: 90px; left: 40px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; max-height: 90vh; background: var(--card); border-radius: 24px 24px 0 0; padding: 20px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); }
        .active-form { border: 2px solid var(--red); background: #331111; color: var(--red); font-weight: bold; }
        .item-selected { border-color: var(--blue) !important; color: var(--blue) !important; background: #0a1a3a !important; font-weight: bold; }
        
        /* 이미지 에러 시 텍스트 스타일 */
        .img-fallback { font-size: 10px; text-align: center; color: #888; padding: 4px; word-break: break-all; }
    </style>
</head>
<body class="f-basic">

    <header class="p-4 flex justify-between items-center bg-black/50 sticky top-0 z-50 border-b border-white/5">
        <h1 class="font-bold text-lg tracking-tight">이옌 길드전 가이드</h1>
        <span class="material-icons cursor-pointer" onclick="location.reload()">refresh</span>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="grid grid-cols-4 gap-1">
            <button class="form-btn active-form p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('basic', this)">기본진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('balance', this)">밸런스진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('attack', this)">공격진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('protect', this)">보호진형</button>
        </div>

        <div class="relative w-full h-[300px] bg-zinc-900 rounded-3xl border border-white/10 overflow-hidden shadow-2xl">
            <div id="slot-wrap">
                <div class="slot s1" onclick="handleHeroSlotClick(1)"><div class="slot-img" id="img-1"></div><div class="text-[8px] text-center mt-1" id="name-1">1번 슬롯</div></div>
                <div class="slot s2" onclick="handleHeroSlotClick(2)"><div class="slot-img" id="img-2"></div><div class="text-[8px] text-center mt-1" id="name-2">2번 슬롯</div></div>
                <div class="slot s3" onclick="handleHeroSlotClick(3)"><div class="slot-img" id="img-3"></div><div class="text-[8px] text-center mt-1" id="name-3">3번 슬롯</div></div>
                <div class="slot s4" onclick="handleHeroSlotClick(4)"><div class="slot-img" id="img-4"></div><div class="text-[8px] text-center mt-1" id="name-4">4번 슬롯</div></div>
                <div class="slot s5" onclick="handleHeroSlotClick(5)"><div class="slot-img" id="img-5"></div><div class="text-[8px] text-center mt-1" id="name-5">5번 슬롯</div></div>
            </div>
            
            <div class="absolute bottom-4 left-4 flex gap-1" onclick="openSkillModal()">
                <div id="skill-0" class="w-9 h-9 bg-black/60 border border-white/20 rounded-lg overflow-hidden flex items-center justify-center"></div>
                <div id="skill-1" class="w-9 h-9 bg-black/60 border border-white/20 rounded-lg overflow-hidden flex items-center justify-center"></div>
                <div id="skill-2" class="w-9 h-9 bg-black/60 border border-white/20 rounded-lg overflow-hidden flex items-center justify-center"></div>
            </div>

            <div class="absolute bottom-4 right-4 flex flex-col items-center" onclick="openSelect('pet')">
                <div id="pet-slot" class="w-12 h-12 rounded-full border-2 border-yellow-500 bg-black flex items-center justify-center overflow-hidden">
                    <span class="material-icons text-yellow-500">pets</span>
                </div>
                <span class="text-[8px] text-yellow-500 font-bold mt-1 uppercase">Pet</span>
            </div>
        </div>

        <div class="bg-zinc-800/40 p-5 rounded-2xl space-y-4 border border-white/5">
            <input type="text" id="deck-title" placeholder="덱 명칭 입력" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm focus:outline-none text-white">
            <div class="grid grid-cols-2 gap-3">
                <select id="deck-type" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs text-white">
                    <option value="공격덱">공격덱</option><option value="방어덱">방어덱</option><option value="카운터덱">카운터덱</option>
                </select>
                <input type="number" id="speed-val" placeholder="속공 수치" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs text-white">
            </div>
            <textarea id="deck-tip" placeholder="공략 팁 입력" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl h-24 text-xs focus:outline-none text-white"></textarea>
            
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 ml-1 font-bold">카운터 지정 (저장된 덱 중 선택)</label>
                <select id="counter-link" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs text-white">
                    <option value="">지정 안 함</option>
                </select>
            </div>
            
            <button onclick="saveDeck()" class="w-full bg-red-600 p-4 rounded-xl font-bold shadow-lg active:bg-red-700 transition">가이드 저장</button>
        </div>

        <div class="space-y-4 pb-24">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
                <button onclick="renderDeckList('전체')" class="px-4 py-2 bg-zinc-800 rounded-full text-xs font-bold shrink-0 border border-white/10">전체</button>
                <button onclick="renderDeckList('공격덱')" class="px-4 py-2 bg-red-900/30 text-red-400 rounded-full text-xs font-bold shrink-0 border border-red-900/50">공격덱</button>
                <button onclick="renderDeckList('방어덱')" class="px-4 py-2 bg-yellow-900/30 text-yellow-400 rounded-full text-xs font-bold shrink-0 border border-yellow-900/50">방어덱</button>
                <button onclick="renderDeckList('카운터덱')" class="px-4 py-2 bg-green-900/30 text-green-400 rounded-full text-xs font-bold shrink-0 border border-green-900/50">카운터덱</button>
            </div>
            <div id="deck-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="selectModal" class="modal" onclick="closeModal('selectModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="font-bold text-white">선택</h2>
                <span class="material-icons cursor-pointer text-zinc-500" onclick="closeModal('selectModal')">close</span>
            </div>
            <div id="modal-grid" class="grid grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="closeModal('detailModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold text-lg mb-6 flex items-center text-white"><span id="detail-hero-name" class="text-red-500 mr-2"></span> 상세 설정</h2>
            <div class="flex gap-4 mb-6">
                <div class="grid grid-cols-2 gap-2 w-32 h-32">
                    <div id="slot-w1" class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[9px] text-center p-1" onclick="openSelect('item', 'w1')">무기1</div>
                    <div id="slot-w2" class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[9px] text-center p-1" onclick="openSelect('item', 'w2')">무기2</div>
                    <div id="slot-a1" class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[9px] text-center p-1" onclick="openSelect('item', 'a1')">방어1</div>
                    <div id="slot-a2" class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[9px] text-center p-1" onclick="openSelect('item', 'a2')">방어2</div>
                </div>
                <div id="slot-acc" class="flex-1 bg-zinc-900 border border-blue-900/30 rounded-xl flex flex-col items-center justify-center" onclick="openSelect('acc')">
                    <span class="material-icons text-blue-400 text-3xl">diamond</span>
                    <span class="text-[10px] font-bold mt-1 text-blue-400">장신구</span>
                </div>
            </div>
            <div id="stat-area" class="grid grid-cols-2 gap-3 text-[10px]"></div>
            <button onclick="closeModal('detailModal')" class="w-full mt-6 bg-zinc-700 p-4 rounded-xl font-bold text-white">설정 완료</button>
        </div>
    </div>

    <div id="skillModal" class="modal" onclick="closeModal('skillModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4 text-white">장착 스킬 선택 (최대 3개)</h2>
            <div id="skill-grid" class="grid grid-cols-2 gap-3"></div>
            <button onclick="closeModal('skillModal')" class="w-full mt-6 bg-red-600 p-4 rounded-xl font-bold text-white">선택 완료</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBObWW-nQdRW7B_HB9O5lmCJFoVRUm-Ijs",
            authDomain: "guid-3755d.firebaseapp.com",
            databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "guid-3755d",
            storageBucket: "guid-3755d.firebasestorage.app",
            messagingSenderId: "397986674872",
            appId: "1:397986674872:web:71ec328badbbedc6d4dc4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const heroData = {
            "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
            "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
            "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
            "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
            "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
            "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
        };
        const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
        const itemData = {
            "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
            "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "보호의반지", "부활의반지", "불사의반지", "시간의반지", "저항의반지", "죽음의반지", "행운의반지"]
        };
        const stats = ["공격력", "방어력", "생명력", "속공", "치명확률", "치명피해"];

        let currentDeck = { formation: 'basic', heroes: [], pet: null, skills: [] };
        let activeSlotIdx = null; 
        let activeItemPart = null; 
        let allDecks = {};

        window.onload = () => {
            const statBox = document.getElementById('stat-area');
            stats.forEach(s => statBox.innerHTML += `<div><label class="opacity-40 text-white">${s}</label><input type="number" class="w-full bg-black border border-white/5 p-1.5 rounded mt-1 text-white"></div>`);
            
            for(let i=1; i<=5; i++){
                let timer;
                const el = document.querySelector(`.s${i}`);
                el.onmousedown = el.ontouchstart = () => timer = setTimeout(() => openHeroDetail(i), 700);
                el.onmouseup = el.ontouchend = () => clearTimeout(timer);
            }
            renderDeckList('전체');
        };

        window.handleHeroSlotClick = (idx) => {
            if(currentDeck.heroes.length >= 3 && !currentDeck.heroes.find(h => h.slot === idx)) return alert("최대 3명까지만 배치할 수 있습니다.");
            openSelect('hero', idx);
        };

        // --- 수정된 이미지/텍스트 대체 로직 ---
        window.openSelect = (type, sub = null) => {
            activeSlotIdx = sub;
            const grid = document.getElementById('modal-grid');
            grid.innerHTML = '';
            document.getElementById('selectModal').style.display = 'block';
            
            let list = [];
            let folder = "";
            if(type === 'hero') { list = Object.values(heroData).flat(); folder = "캐릭터 아이콘 모음"; }
            else if(type === 'pet') { list = petList; folder = "펫 아이콘 모음"; }
            else if(type === 'item') { list = itemData["장비"]; folder = "장비"; activeItemPart = sub; }
            else if(type === 'acc') { list = itemData["장신구"]; folder = "장비"; }

            list.forEach(name => {
                if(type === 'hero' && currentDeck.heroes.some(h => h.name === name)) return;

                const div = document.createElement('div');
                div.className = "text-center cursor-pointer";
                div.innerHTML = `
                    <div class="aspect-square bg-zinc-800 rounded-lg flex items-center justify-center border border-white/10 overflow-hidden relative group">
                        <img src="public/도감/${folder}/${name}.png" 
                             class="w-full h-full object-cover block"
                             onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                        <div class="hidden img-fallback px-1 font-medium text-zinc-400">${name}</div>
                    </div>
                    <div class="text-[8px] mt-1 truncate text-zinc-500">${name}</div>
                `;
                div.onclick = () => {
                    if(type === 'hero') {
                        currentDeck.heroes = currentDeck.heroes.filter(h => h.slot !== activeSlotIdx);
                        currentDeck.heroes.push({ slot: activeSlotIdx, name, items: {} });
                        updateBattleBoard();
                    } else if(type === 'pet') {
                        currentDeck.pet = name;
                        const petSlot = document.getElementById('pet-slot');
                        petSlot.innerHTML = `<img src="public/도감/펫 아이콘 모음/${name}.png" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-[10px] text-yellow-500 font-bold\'>${name}</span>'">`;
                    } else if(type === 'item' || type === 'acc') {
                        const hero = currentDeck.heroes.find(h => h.slot === activeSlotIdx);
                        if(!hero) return alert("영웅을 먼저 선택해주세요.");
                        
                        if(type === 'item') {
                            hero.items[activeItemPart] = name;
                            const el = document.getElementById(`slot-${activeItemPart}`);
                            el.innerText = name; el.classList.add('item-selected');
                        } else {
                            hero.items.acc = name;
                            const el = document.getElementById(`slot-acc`);
                            el.querySelector('span:last-child').innerText = name; el.classList.add('item-selected');
                        }
                    }
                    closeModal('selectModal');
                };
                grid.appendChild(div);
            });
        };

        function updateBattleBoard() {
            for(let i=1; i<=5; i++) {
                const img = document.getElementById(`img-${i}`);
                const nameTxt = document.getElementById(`name-${i}`);
                const hero = currentDeck.heroes.find(h => h.slot === i);

                if(hero) {
                    img.innerHTML = `<img src="public/도감/캐릭터 아이콘 모음/${hero.name}.png" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-[10px] font-bold\'>${hero.name}</span>'">`;
                    img.classList.remove('x-mark');
                    nameTxt.innerText = hero.name;
                } else if(currentDeck.heroes.length >= 3) {
                    img.innerHTML = `<span class="material-icons text-zinc-800">close</span>`;
                    img.classList.add('x-mark');
                    nameTxt.innerText = "비활성";
                } else {
                    img.innerHTML = ''; img.classList.remove('x-mark'); nameTxt.innerText = `${i}번 슬롯`;
                }
            }
        }

        window.openHeroDetail = (idx) => {
            const hero = currentDeck.heroes.find(h => h.slot === idx);
            if(!hero) return alert("영웅을 먼저 선택해야 합니다.");
            activeSlotIdx = idx;
            document.getElementById('detail-hero-name').innerText = hero.name;
            
            ['w1', 'w2', 'a1', 'a2'].forEach(p => {
                const el = document.getElementById(`slot-${p}`);
                if(hero.items && hero.items[p]) { el.innerText = hero.items[p]; el.classList.add('item-selected'); }
                else { el.innerText = p.startsWith('w')?'무기':'방어구'; el.classList.remove('item-selected'); }
            });
            const accEl = document.getElementById('slot-acc');
            if(hero.items && hero.items.acc) { accEl.querySelector('span:last-child').innerText = hero.items.acc; accEl.classList.add('item-selected'); }
            else { accEl.querySelector('span:last-child').innerText = "장신구"; accEl.classList.remove('item-selected'); }

            document.getElementById('detailModal').style.display = 'block';
        };

        window.openSkillModal = () => {
            if(currentDeck.heroes.length === 0) return alert("영웅을 먼저 배치하세요.");
            const grid = document.getElementById('skill-grid');
            grid.innerHTML = '';
            document.getElementById('skillModal').style.display = 'block';

            currentDeck.heroes.forEach(h => {
                [2, 3].forEach(num => {
                    const sName = `${h.name}-${num}`;
                    const isSel = currentDeck.skills.includes(sName);
                    const div = document.createElement('div');
                    div.className = `p-2 bg-zinc-900 rounded-xl flex items-center gap-2 border-2 ${isSel?'border-red-500':'border-transparent'}`;
                    div.innerHTML = `
                        <div class="w-9 h-9 bg-black rounded overflow-hidden flex items-center justify-center shrink-0">
                            <img src="public/도감/캐릭터 스킬 모음/${sName}.png" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerText='${num==2?'1':'2'}'">
                        </div>
                        <div class="text-[10px] truncate text-white">${h.name} 스킬${num-1}</div>`;
                    div.onclick = () => {
                        if(currentDeck.skills.includes(sName)) currentDeck.skills = currentDeck.skills.filter(s => s !== sName);
                        else if(currentDeck.skills.length < 3) currentDeck.skills.push(sName);
                        openSkillModal(); updateSkillSlots();
                    };
                    grid.appendChild(div);
                });
            });
        };

        function updateSkillSlots() {
            for(let i=0; i<3; i++) {
                const slot = document.getElementById(`skill-${i}`);
                if(currentDeck.skills[i]) slot.innerHTML = `<img src="public/도감/캐릭터 스킬 모음/${currentDeck.skills[i]}.png" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerText='S'">`;
                else slot.innerHTML = '';
            }
        }

        window.saveDeck = async () => {
            const title = document.getElementById('deck-title').value;
            if(!title || currentDeck.heroes.length < 3) return alert("덱 이름과 3인 배치는 필수입니다.");
            const data = { ...currentDeck, title, type: document.getElementById('deck-type').value, speed: document.getElementById('speed-val').value, tip: document.getElementById('deck-tip').value, counterId: document.getElementById('counter-link').value, date: Date.now() };
            await push(ref(db, 'decks'), data);
            alert("저장 완료!");
            location.reload();
        };

        window.renderDeckList = (filter) => {
            onValue(ref(db, 'decks'), (snap) => {
                const container = document.getElementById('deck-list');
                const counterSel = document.getElementById('counter-link');
                container.innerHTML = '';
                if(!snap.exists()) return;
                allDecks = snap.val();

                Object.entries(allDecks).reverse().forEach(([id, d]) => {
                    const opt = document.createElement('option'); opt.value = id; opt.text = d.title; counterSel.appendChild(opt);
                    if(filter !== '전체' && d.type !== filter) return;

                    const color = d.type === '공격덱' ? 'red-500' : (d.type === '방어덱' ? 'yellow-500' : 'green-500');
                    const banner = document.createElement('div');
                    banner.className = `p-4 rounded-2xl border-l-4 border-${color} bg-zinc-800/60 flex justify-between items-center shadow-lg`;
                    banner.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="flex -space-x-3">
                                ${d.heroes.map(h => `<img src="public/도감/캐릭터 아이콘 모음/${h.name}.png" class="w-10 h-10 rounded-full border-2 border-zinc-900" onerror="this.style.display='none'">`).join('')}
                            </div>
                            <div>
                                <div class="font-bold text-sm text-white">${d.title}</div>
                                <div class="text-[9px] opacity-40 text-zinc-400">${d.type} | 속공 ${d.speed || 0}</div>
                            </div>
                        </div>
                        <span class="material-icons text-zinc-600">chevron_right</span>
                    `;
                    container.appendChild(banner);
                });
            });
        };

        window.setForm = (f, btn) => {
            document.body.className = `f-${f}`;
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active-form'));
            btn.classList.add('active-form'); currentDeck.formation = f;
        };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    </script>
</body>
</html>
