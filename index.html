<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드용 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #ff4d4d; }
        body.light-mode { --bg: #f5f5f5; --card: #ffffff; --text: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; transition: 0.3s; overflow-x: hidden; touch-action: manipulation; }
        
        /* 진형 슬롯 애니메이션 */
        .slot { position: absolute; width: 75px; height: 115px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .slot-img { width: 65px; height: 65px; background: #2a2a2a; border: 2px solid #555; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* 진형별 좌표 */
        .f-basic .s0 { top: 80px; left: 20px; } .f-basic .s1 { top: 20px; left: 115px; } .f-basic .s2 { top: 140px; left: 115px; } .f-basic .s3 { top: 20px; left: 210px; } .f-basic .s4 { top: 140px; left: 210px; }
        .f-balance .s0 { top: 20px; left: 20px; } .f-balance .s1 { top: 140px; left: 20px; } .f-balance .s2 { top: 80px; left: 115px; } .f-balance .s3 { top: 20px; left: 210px; } .f-balance .s4 { top: 140px; left: 210px; }
        .f-attack .s0 { top: 80px; left: 210px; } .f-attack .s1 { top: 20px; left: 115px; } .f-attack .s2 { top: 140px; left: 115px; } .f-attack .s3 { top: 20px; left: 20px; } .f-attack .s4 { top: 140px; left: 20px; }
        .f-protect .s0 { top: 80px; left: 20px; } .f-protect .s1 { top: 10px; left: 115px; } .f-protect .s2 { top: 150px; left: 115px; } .f-protect .s3 { top: 80px; left: 115px; } .f-protect .s4 { top: 80px; left: 210px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; max-height: 90vh; background: var(--card); border-radius: 24px 24px 0 0; padding: 20px; overflow-y: auto; }
        @media (min-width: 768px) { .modal-content { width: 500px; left: 50%; transform: translateX(-50%); bottom: 20px; border-radius: 24px; } }
        
        .selected-skill { border: 3px solid #ff4d4d; transform: scale(1.05); }
        .active-form { border: 2px solid #ff4d4d; background: #331111; font-weight: bold; }
    </style>
</head>
<body class="f-basic">

    <header class="flex justify-between items-center p-4 bg-black/40 sticky top-0 z-50">
        <h1 class="text-lg font-bold">이옌 길드전 가이드용 앱</h1>
        <div class="flex gap-4">
            <span class="material-icons cursor-pointer" onclick="toggleTheme()">brightness_4</span>
            <span class="material-icons cursor-pointer" onclick="openAdmin()">menu</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-4 gap-2">
            <button class="form-btn active-form bg-zinc-800 p-2 rounded-lg text-[10px]" onclick="setForm('basic', this)">기본진형</button>
            <button class="form-btn bg-zinc-800 p-2 rounded-lg text-[10px]" onclick="setForm('balance', this)">밸런스진형</button>
            <button class="form-btn bg-zinc-800 p-2 rounded-lg text-[10px]" onclick="setForm('attack', this)">공격진형</button>
            <button class="form-btn bg-zinc-800 p-2 rounded-lg text-[10px]" onclick="setForm('protect', this)">보호진형</button>
        </div>

        <div class="relative w-full h-[300px] bg-zinc-900 rounded-3xl border border-zinc-700 overflow-hidden shadow-inner">
            <div id="hero-slots-container"></div>
            <div class="absolute bottom-4 right-4 text-center" onclick="openSelect('pet')">
                <div id="pet-display" class="w-14 h-14 rounded-full border-2 border-yellow-500 bg-zinc-800 flex items-center justify-center overflow-hidden">
                    <span class="material-icons text-yellow-500">pets</span>
                </div>
                <span class="text-[10px] mt-1 text-yellow-500 font-bold">PET</span>
            </div>
            <div class="absolute bottom-4 left-4 flex gap-2" onclick="openSkillSelector()">
                <div class="skill-slot w-10 h-10 bg-zinc-800 border border-zinc-600 rounded flex items-center justify-center overflow-hidden" id="deck-skill-0"></div>
                <div class="skill-slot w-10 h-10 bg-zinc-800 border border-zinc-600 rounded flex items-center justify-center overflow-hidden" id="deck-skill-1"></div>
                <div class="skill-slot w-10 h-10 bg-zinc-800 border border-zinc-600 rounded flex items-center justify-center overflow-hidden" id="deck-skill-2"></div>
            </div>
        </div>

        <div class="bg-zinc-800/50 p-5 rounded-2xl space-y-4 border border-zinc-700/50">
            <input type="text" id="deck-name" placeholder="덱 명칭 입력" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl">
            <div class="grid grid-cols-2 gap-3">
                <select id="deck-type" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-sm">
                    <option value="공격덱">공격덱 (빨강)</option>
                    <option value="방어덱">방어덱 (노랑)</option>
                    <option value="카운터덱">카운터덱 (초록)</option>
                </select>
                <input type="number" id="speed-val" placeholder="속공 수치" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-sm">
            </div>
            <textarea id="deck-tip" placeholder="공략 팁" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl h-24 text-sm"></textarea>
            <select id="counter-select" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-sm">
                <option value="">카운터 덱 선택</option>
            </select>
            <button onclick="saveDeck()" class="w-full bg-red-600 p-4 rounded-xl font-bold shadow-lg">가이드덱 저장</button>
        </div>

        <div id="deck-display-area" class="space-y-3 pb-24"></div>
    </main>

    <div id="skillModal" class="modal" onclick="closeModal('skillModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold text-lg mb-4">장착 스킬 선택 (최대 3개)</h2>
            <div id="skill-candidate-grid" class="grid grid-cols-2 gap-4">
                </div>
            <button onclick="closeModal('skillModal')" class="w-full mt-6 bg-red-600 p-4 rounded-xl font-bold">선택 완료</button>
        </div>
    </div>

    <div id="selectModal" class="modal" onclick="closeModal('selectModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="font-bold text-lg">항목 선택</h2>
                <span class="material-icons cursor-pointer" onclick="closeModal('selectModal')">close</span>
            </div>
            <input type="text" id="modal-search" oninput="filterModalGrid()" placeholder="검색..." class="w-full bg-zinc-900 p-3 rounded-xl mb-4 border border-zinc-700">
            <div id="modal-grid" class="grid grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="closeModal('detailModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4">상세 설정</h2>
            <div id="stat-inputs-area" class="grid grid-cols-2 gap-3 text-xs mb-6"></div>
            <button onclick="closeModal('detailModal')" class="w-full bg-blue-600 p-4 rounded-xl font-bold">저장</button>
        </div>
    </div>

    <div id="adminModal" class="modal" onclick="closeModal('adminModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold text-xl mb-6">관리자 메뉴 (데이터 수정)</h2>
            <div class="space-y-4">
                <div class="bg-zinc-900 p-4 rounded-xl">
                    <p class="text-sm mb-2">신규 영웅/펫 추가</p>
                    <input type="text" id="admin-name" placeholder="이름" class="w-full bg-zinc-800 p-2 rounded mb-2">
                    <select id="admin-type" class="w-full bg-zinc-800 p-2 rounded">
                        <option value="hero">영웅</option>
                        <option value="pet">펫</option>
                    </select>
                    <button class="w-full bg-zinc-700 mt-2 p-2 rounded">DB 반영</button>
                </div>
                <button onclick="clearAllData()" class="w-full bg-red-900/40 p-4 rounded-xl text-red-400 font-bold">전체 데이터 초기화</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBObWW-nQdRW7B_HB9O5lmCJFoVRUm-Ijs",
            authDomain: "guid-3755d.firebaseapp.com",
            databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "guid-3755d",
            storageBucket: "guid-3755d.firebasestorage.app",
            messagingSenderId: "397986674872",
            appId: "1:397986674872:web:71ec328badbbedc6d4dc4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const heroData = {
            "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
            "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
            "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
            "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
            "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "에반", "카린", "유리"]
        };
        const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
        const stats = ["공격력", "방어력", "생명력", "속공", "치명확률", "치명피해", "약공확률", "막기확률", "피해감소", "효과적중", "효과저항"];

        let currentDeck = { formation: 'basic', heroes: [null, null, null], pet: null, skills: [] };
        let activeIdx = null;

        window.onload = () => {
            const container = document.getElementById('hero-slots-container');
            for(let i=0; i<5; i++){
                const div = document.createElement('div');
                div.className = `slot s${i}`;
                if(i < 3) {
                    div.onclick = () => openSelect('hero', i);
                    let timer;
                    div.onmousedown = div.ontouchstart = () => timer = setTimeout(() => openDetail(i), 700);
                    div.onmouseup = div.ontouchend = () => clearTimeout(timer);
                    div.innerHTML = `<div class="slot-img" id="hero-img-${i}"><span class="material-icons opacity-20">person</span></div>
                                     <div class="text-[9px] text-center mt-1 truncate font-bold" id="hero-name-${i}">영웅 미선택</div>`;
                } else {
                    div.innerHTML = `<div class="slot-img bg-black/40 text-red-600 font-bold text-2xl">X</div>`;
                }
                container.appendChild(div);
            }
            const statBox = document.getElementById('stat-inputs-area');
            stats.forEach(s => statBox.innerHTML += `<div><label>${s}</label><input type="number" class="w-full bg-zinc-900 p-2 rounded"></div>`);
            loadDecks();
        };

        window.openSelect = (type, idx = null) => {
            activeIdx = idx;
            const grid = document.getElementById('modal-grid');
            grid.innerHTML = '';
            document.getElementById('selectModal').style.display = 'block';
            let list = (type === 'hero') ? Object.values(heroData).flat() : petList;
            let folder = (type === 'hero') ? "캐릭터 아이콘 모음" : "펫 아이콘 모음";
            list.forEach(name => {
                const div = document.createElement('div');
                div.className = "text-center";
                div.innerHTML = `<div class="aspect-square bg-zinc-800 rounded-lg mb-1 overflow-hidden flex items-center justify-center text-[8px]">
                    <img src="public/도감/${folder}/${name}.png" onerror="this.src='public/도감/${folder}/${name}.jpg'; this.onerror=function(){this.parentElement.innerText='${name}'}" class="w-full h-full object-cover">
                </div><div class="text-[9px] truncate">${name}</div>`;
                div.onclick = () => {
                    if(type === 'hero') {
                        currentDeck.heroes[activeIdx] = name;
                        document.getElementById(`hero-img-${activeIdx}`).innerHTML = `<img src="public/도감/${folder}/${name}.png" class="w-full h-full object-cover">`;
                        document.getElementById(`hero-name-${activeIdx}`).innerText = name;
                    } else {
                        currentDeck.pet = name;
                        document.getElementById('pet-display').innerHTML = `<img src="public/도감/${folder}/${name}.png" class="w-full h-full object-cover">`;
                    }
                    closeModal('selectModal');
                };
                grid.appendChild(div);
            });
        };

        // --- 스킬 선택 로직 (영웅 3인 x 2스킬 = 6개 중 3개 선택) ---
        window.openSkillSelector = () => {
            const selectedHeroes = currentDeck.heroes.filter(h => h);
            if(selectedHeroes.length === 0) return alert('영웅을 먼저 선택하세요!');
            
            const grid = document.getElementById('skill-candidate-grid');
            grid.innerHTML = '';
            document.getElementById('skillModal').style.display = 'block';

            selectedHeroes.forEach(hero => {
                [2, 3].forEach(num => {
                    const skillName = `${hero}-${num}`;
                    const div = document.createElement('div');
                    const isSel = currentDeck.skills.includes(skillName);
                    div.className = `p-2 bg-zinc-900 rounded-xl flex items-center gap-2 border-2 ${isSel ? 'border-red-500 selected-skill' : 'border-transparent'}`;
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-zinc-800 rounded flex items-center justify-center overflow-hidden shrink-0">
                            <img src="public/도감/캐릭터 스킬 모음/${skillName}.png" onerror="this.style.display='none'; this.nextSibling.innerText='${hero}(${num==2?'위':'아래'})'" class="w-full h-full object-cover">
                            <span class="text-[8px] text-center"></span>
                        </div>
                        <span class="text-xs truncate">${hero} 스킬${num-1}</span>`;
                    div.onclick = () => {
                        if(currentDeck.skills.includes(skillName)) {
                            currentDeck.skills = currentDeck.skills.filter(s => s !== skillName);
                        } else if(currentDeck.skills.length < 3) {
                            currentDeck.skills.push(skillName);
                        }
                        openSkillSelector(); // 리렌더링
                        updateSkillSlots();
                    };
                    grid.appendChild(div);
                });
            });
        };

        function updateSkillSlots() {
            for(let i=0; i<3; i++) {
                const slot = document.getElementById(`deck-skill-${i}`);
                if(currentDeck.skills[i]) {
                    slot.innerHTML = `<img src="public/도감/캐릭터 스킬 모음/${currentDeck.skills[i]}.png" class="w-full h-full object-cover">`;
                } else {
                    slot.innerHTML = '';
                }
            }
        }

        window.saveDeck = async () => {
            const name = document.getElementById('deck-name').value;
            if(!name) return alert('덱 이름을 입력하세요');
            await push(ref(db, 'guild_decks'), { ...currentDeck, name, type: document.getElementById('deck-type').value, speed: document.getElementById('speed-val').value, tip: document.getElementById('deck-tip').value });
            alert('저장되었습니다!');
            location.reload();
        };

        function loadDecks() {
            onValue(ref(db, 'guild_decks'), (snap) => {
                const area = document.getElementById('deck-display-area');
                area.innerHTML = '';
                if(!snap.val()) return;
                Object.entries(snap.val()).reverse().forEach(([id, d]) => {
                    area.innerHTML += `<div class="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center shadow-lg border-l-4 border-red-500">
                        <div><div class="font-bold">${d.name}</div><div class="flex gap-1 mt-1">
                        ${d.heroes.filter(h=>h).map(h=>`<img src="public/도감/캐릭터 아이콘 모음/${h}.png" class="w-6 h-6 rounded">`).join('')}</div></div>
                        <span class="material-icons opacity-50">visibility</span></div>`;
                });
            });
        }

        window.setForm = (f, b) => { document.body.className = `f-${f}`; document.querySelectorAll('.form-btn').forEach(btn=>btn.classList.remove('active-form')); b.classList.add('active-form'); currentDeck.formation = f; };
        window.openAdmin = () => document.getElementById('adminModal').style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.toggleTheme = () => document.body.classList.toggle('light-mode');
        window.openDetail = (i) => document.getElementById('detailModal').style.display = 'block';
        window.clearAllData = () => { if(confirm('전체 삭제하시겠습니까?')) set(ref(db, 'guild_decks'), null); };
    </script>
</body>
</html>
