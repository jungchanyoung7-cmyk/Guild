<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드용 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --red: #ff4d4d; --yellow: #ffcc00; --green: #4ade80; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 진형 좌표 (왼쪽: 3,4,5 / 오른쪽: 1,2) */
        .slot { position: absolute; width: 70px; height: 105px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .slot-img { width: 62px; height: 62px; background: #222; border: 2px solid #444; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .x-mark { background: rgba(0,0,0,0.7); border: 2px dashed #333; color: #444; pointer-events: none; }

        .f-basic .s1 { top: 40px; right: 25px; } .f-basic .s2 { top: 140px; right: 25px; }
        .f-basic .s3 { top: 10px; left: 25px; } .f-basic .s4 { top: 90px; left: 25px; } .f-basic .s5 { top: 170px; left: 25px; }

        .f-balance .s1 { top: 10px; right: 25px; } .f-balance .s2 { top: 90px; right: 25px; } .f-balance .s3 { top: 170px; right: 25px; }
        .f-balance .s4 { top: 40px; left: 25px; } .f-balance .s5 { top: 140px; left: 25px; }

        .f-attack .s1 { top: 90px; right: 40px; }
        .f-attack .s2 { top: 0px; left: 25px; } .f-attack .s3 { top: 60px; left: 25px; } .f-attack .s4 { top: 120px; left: 25px; } .f-attack .s5 { top: 180px; left: 25px; }

        .f-protect .s1 { top: 0px; right: 25px; } .f-protect .s2 { top: 60px; right: 25px; } .f-protect .s3 { top: 120px; right: 25px; } .f-protect .s4 { top: 180px; right: 25px; }
        .f-protect .s5 { top: 90px; left: 40px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; max-height: 90vh; background: var(--card); border-radius: 24px 24px 0 0; padding: 20px; overflow-y: auto; }
        .active-form { border: 2px solid var(--red); background: #331111; color: var(--red); font-weight: bold; }
        .selected-skill-card { border: 3px solid var(--red); transform: scale(1.05); }
    </style>
</head>
<body class="f-basic">

    <header class="p-4 flex justify-between items-center bg-black/50 sticky top-0 z-50">
        <h1 class="font-bold text-lg">이옌 길드전 가이드용 앱</h1>
        <span class="material-icons cursor-pointer" onclick="openAdmin()">menu</span>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="grid grid-cols-4 gap-1">
            <button class="form-btn active-form p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('basic', this)">기본진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('balance', this)">밸런스진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('attack', this)">공격진형</button>
            <button class="form-btn p-2 text-[10px] rounded-lg bg-zinc-800" onclick="setForm('protect', this)">보호진형</button>
        </div>

        <div class="relative w-full h-[280px] bg-zinc-900 rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
            <div id="slot-wrap">
                <div class="slot s1" onclick="handleHeroSelect(1)"><div class="slot-img" id="img-1"></div><div class="text-[8px] text-center mt-1" id="name-1">1번 슬롯</div></div>
                <div class="slot s2" onclick="handleHeroSelect(2)"><div class="slot-img" id="img-2"></div><div class="text-[8px] text-center mt-1" id="name-2">2번 슬롯</div></div>
                <div class="slot s3" onclick="handleHeroSelect(3)"><div class="slot-img" id="img-3"></div><div class="text-[8px] text-center mt-1" id="name-3">3번 슬롯</div></div>
                <div class="slot s4" onclick="handleHeroSelect(4)"><div class="slot-img" id="img-4"></div><div class="text-[8px] text-center mt-1" id="name-4">4번 슬롯</div></div>
                <div class="slot s5" onclick="handleHeroSelect(5)"><div class="slot-img" id="img-5"></div><div class="text-[8px] text-center mt-1" id="name-5">5번 슬롯</div></div>
            </div>
            
            <div class="absolute bottom-4 right-4 flex flex-col items-center" onclick="openSelect('pet')">
                <div id="pet-slot" class="w-12 h-12 rounded-full border-2 border-yellow-500 bg-black flex items-center justify-center overflow-hidden">
                    <span class="material-icons text-yellow-500 text-xl">pets</span>
                </div>
                <span class="text-[8px] text-yellow-500 font-bold mt-1">PET</span>
            </div>

            <div class="absolute bottom-4 left-4 flex gap-1" onclick="openSkillModal()">
                <div class="w-9 h-9 bg-black/60 border border-white/20 rounded-md overflow-hidden" id="skill-slot-0"></div>
                <div class="w-9 h-9 bg-black/60 border border-white/20 rounded-md overflow-hidden" id="skill-slot-1"></div>
                <div class="w-9 h-9 bg-black/60 border border-white/20 rounded-md overflow-hidden" id="skill-slot-2"></div>
            </div>
        </div>

        <div class="bg-zinc-800/40 p-5 rounded-2xl border border-white/5 space-y-4">
            <input type="text" id="deck-title" placeholder="덱 명칭 입력" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl focus:outline-none">
            <div class="grid grid-cols-2 gap-3">
                <select id="deck-type" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs">
                    <option value="공격덱">공격덱 (빨강)</option>
                    <option value="방어덱">방어덱 (노랑)</option>
                    <option value="카운터덱">카운터덱 (초록)</option>
                </select>
                <input type="number" id="speed-val" placeholder="속공 수치" class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs">
            </div>
            <textarea id="deck-tip" placeholder="공략 팁 입력" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl h-24 text-xs focus:outline-none"></textarea>
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 ml-1">카운터 지정 덱 선택</label>
                <select id="counter-select" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700 text-xs">
                    <option value="">지정 안 함</option>
                </select>
            </div>
            <button onclick="saveDeck()" class="w-full bg-red-600 p-4 rounded-xl font-bold shadow-lg">가이드덱 저장</button>
        </div>

        <div class="space-y-4 pb-24">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
                <button onclick="loadDecks('전체')" class="px-4 py-1.5 bg-zinc-800 rounded-full text-xs font-bold shrink-0 border border-white/10">전체</button>
                <button onclick="loadDecks('공격덱')" class="px-4 py-1.5 bg-red-900/30 text-red-400 rounded-full text-xs font-bold shrink-0 border border-red-900/50">공격덱</button>
                <button onclick="loadDecks('방어덱')" class="px-4 py-1.5 bg-yellow-900/30 text-yellow-400 rounded-full text-xs font-bold shrink-0 border border-yellow-900/50">방어덱</button>
                <button onclick="loadDecks('카운터덱')" class="px-4 py-1.5 bg-green-900/30 text-green-400 rounded-full text-xs font-bold shrink-0 border border-green-900/50">카운터덱</button>
            </div>
            <div id="deck-list-container" class="space-y-3"></div>
        </div>
    </main>

    <div id="selectModal" class="modal" onclick="closeModal('selectModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="font-bold">선택</h2>
                <span class="material-icons cursor-pointer" onclick="closeModal('selectModal')">close</span>
            </div>
            <input type="text" id="modal-search" oninput="filterModalGrid()" placeholder="검색어 입력..." class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700 mb-4 text-sm">
            <div id="modal-grid" class="grid grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="closeModal('detailModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4 flex items-center"><span class="material-icons mr-2 text-red-500">settings</span>영웅 상세 설정</h2>
            <div class="flex gap-4 mb-6">
                <div class="grid grid-cols-2 gap-1.5 w-32 h-32 shrink-0">
                    <div class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[8px] text-zinc-500" onclick="openSelect('item', 'w1')">무기1</div>
                    <div class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[8px] text-zinc-500" onclick="openSelect('item', 'w2')">무기2</div>
                    <div class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[8px] text-zinc-500" onclick="openSelect('item', 'a1')">방어1</div>
                    <div class="bg-zinc-900 border border-white/10 rounded flex items-center justify-center text-[8px] text-zinc-500" onclick="openSelect('item', 'a2')">방어2</div>
                </div>
                <div class="flex-1 bg-zinc-900 border border-blue-900/50 rounded-xl flex flex-col items-center justify-center" onclick="openSelect('acc')">
                    <span class="material-icons text-blue-500 text-3xl mb-1">diamond</span>
                    <span class="text-[10px] font-bold">장신구</span>
                </div>
            </div>
            <div id="stat-inputs" class="grid grid-cols-2 gap-3 text-[10px]"></div>
            <button onclick="closeModal('detailModal')" class="w-full mt-6 bg-zinc-700 p-4 rounded-xl font-bold">설정 저장</button>
        </div>
    </div>

    <div id="skillModal" class="modal" onclick="closeModal('skillModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4">장착 스킬 선택 (최대 3개)</h2>
            <div id="skill-grid" class="grid grid-cols-2 gap-3"></div>
            <button onclick="closeModal('skillModal')" class="w-full mt-6 bg-red-600 p-4 rounded-xl font-bold">선택 완료</button>
        </div>
    </div>

    <div id="viewModal" class="modal" onclick="closeModal('viewModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="view-title" class="font-bold text-xl mb-2"></h2>
            <div id="view-meta" class="text-xs mb-4 text-zinc-400"></div>
            <div id="view-heroes" class="flex gap-2 mb-4"></div>
            <div id="view-skills" class="flex gap-2 mb-4"></div>
            <div class="p-4 bg-zinc-900 rounded-xl mb-4 border border-white/5">
                <h4 class="text-[10px] text-zinc-500 mb-1 font-bold uppercase">공략 가이드</h4>
                <p id="view-tip" class="text-sm leading-relaxed"></p>
            </div>
            <div id="view-counter" class="p-4 bg-zinc-900 rounded-xl border border-red-900/30"></div>
            <button onclick="closeModal('viewModal')" class="w-full mt-6 bg-zinc-700 p-4 rounded-xl font-bold">닫기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBObWW-nQdRW7B_HB9O5lmCJFoVRUm-Ijs",
            authDomain: "guid-3755d.firebaseapp.com",
            databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "guid-3755d",
            storageBucket: "guid-3755d.firebasestorage.app",
            messagingSenderId: "397986674872",
            appId: "1:397986674872:web:71ec328badbbedc6d4dc4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 데이터 정의 ---
        const heroData = {
            "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
            "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
            "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
            "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
            "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
            "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
            "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
            "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
        };
        const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
        const itemData = {
            "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
            "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"]
        };
        const stats = ["공격력", "방어력", "생명력", "속공", "치명확률", "치명피해", "약공확률", "막기확률", "피해감소", "효과적중", "효과저항"];

        let deckState = { formation: 'basic', heroes: [], pet: null, skills: [] };
        let activeIdx = null;
        let allDecks = {};

        // --- 초기화 ---
        window.onload = () => {
            const statBox = document.getElementById('stat-inputs');
            stats.forEach(s => statBox.innerHTML += `<div><label class="opacity-40">${s}</label><input type="number" class="w-full bg-zinc-900 border border-zinc-700 p-1.5 rounded mt-1"></div>`);
            
            // 롱탭 처리
            for(let i=1; i<=5; i++) {
                let timer;
                const el = document.querySelector(`.s${i}`);
                el.addEventListener('touchstart', () => timer = setTimeout(() => openHeroDetail(i), 700));
                el.addEventListener('touchend', () => clearTimeout(timer));
                el.addEventListener('mousedown', () => timer = setTimeout(() => openHeroDetail(i), 700));
                el.addEventListener('mouseup', () => clearTimeout(timer));
            }
            loadDecks('전체');
        };

        // --- 영웅 선택 로직 ---
        window.handleHeroSelect = (slotIdx) => {
            if(deckState.heroes.length >= 3 && !deckState.heroes.find(h => h.slot === slotIdx)) {
                return alert("영웅은 최대 3명까지만 선택 가능합니다.");
            }
            openSelect('hero', slotIdx);
        };

        window.openSelect = (type, idx = null) => {
            activeIdx = idx;
            const grid = document.getElementById('modal-grid');
            grid.innerHTML = '';
            document.getElementById('selectModal').style.display = 'block';
            
            let list = (type === 'hero') ? Object.values(heroData).flat() : (type === 'pet' ? petList : (type === 'item' ? itemData['장비'] : itemData['장신구']));
            let folder = (type === 'hero') ? "캐릭터 아이콘 모음" : (type === 'pet' ? "펫 아이콘 모음" : "장비");

            list.forEach(name => {
                if(type === 'hero' && deckState.heroes.some(h => h.name === name)) return;
                const div = document.createElement('div');
                div.className = "text-center";
                div.innerHTML = `<div class="aspect-square bg-zinc-800 rounded-lg flex items-center justify-center border border-white/5 overflow-hidden">
                    <img src="public/도감/${folder}/${name}.png" onerror="this.src='public/도감/${folder}/${name}.jpg'; this.onerror=function(){this.parentElement.innerText='${name}'}" class="w-full h-full object-cover">
                </div><div class="text-[8px] mt-1 truncate">${name}</div>`;
                div.onclick = () => confirmChoice(type, name);
                grid.appendChild(div);
            });
        };

        function confirmChoice(type, name) {
            if(type === 'hero') {
                deckState.heroes = deckState.heroes.filter(h => h.slot !== activeIdx);
                deckState.heroes.push({ slot: activeIdx, name: name });
                updateSlotsUI();
            } else if(type === 'pet') {
                deckState.pet = name;
                document.getElementById('pet-slot').innerHTML = `<img src="public/도감/펫 아이콘 모음/${name}.png" class="w-full h-full object-cover">`;
            }
            closeModal('selectModal');
        }

        function updateSlotsUI() {
            for(let i=1; i<=5; i++) {
                const imgBox = document.getElementById(`img-${i}`);
                const nameBox = document.getElementById(`name-${i}`);
                const hero = deckState.heroes.find(h => h.slot === i);

                if(hero) {
                    imgBox.innerHTML = `<img src="public/도감/캐릭터 아이콘 모음/${hero.name}.png" class="w-full h-full object-cover">`;
                    imgBox.classList.remove('x-mark');
                    nameBox.innerText = hero.name;
                } else if(deckState.heroes.length >= 3) {
                    imgBox.innerHTML = `<span class="material-icons">close</span>`;
                    imgBox.classList.add('x-mark');
                    nameBox.innerText = "X";
                } else {
                    imgBox.innerHTML = '';
                    imgBox.classList.remove('x-mark');
                    nameBox.innerText = `${i}번 슬롯`;
                }
            }
        }

        // --- 스킬 선택 로직 ---
        window.openSkillModal = () => {
            if(deckState.heroes.length === 0) return alert("영웅을 먼저 선택하세요.");
            const grid = document.getElementById('skill-grid');
            grid.innerHTML = '';
            document.getElementById('skillModal').style.display = 'block';

            deckState.heroes.forEach(hero => {
                [2, 3].forEach(num => {
                    const skillName = `${hero.name}-${num}`;
                    const div = document.createElement('div');
                    const isSelected = deckState.skills.includes(skillName);
                    div.className = `p-2 bg-zinc-900 rounded-xl flex items-center gap-2 border-2 ${isSelected ? 'selected-skill-card' : 'border-transparent'}`;
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-black rounded overflow-hidden flex items-center justify-center shrink-0">
                            <img src="public/도감/캐릭터 스킬 모음/${skillName}.png" onerror="this.style.display='none'; this.nextSibling.innerText='${hero.name}(${num==2?'위':'아래'})'" class="w-full h-full object-cover">
                            <span class="text-[8px] text-center px-1"></span>
                        </div>
                        <div class="text-[10px] truncate">${hero.name} 스킬${num-1}</div>`;
                    div.onclick = () => {
                        if(deckState.skills.includes(skillName)) deckState.skills = deckState.skills.filter(s => s !== skillName);
                        else if(deckState.skills.length < 3) deckState.skills.push(skillName);
                        openSkillModal();
                        updateSkillSlots();
                    };
                    grid.appendChild(div);
                });
            });
        };

        function updateSkillSlots() {
            for(let i=0; i<3; i++) {
                const slot = document.getElementById(`skill-slot-${i}`);
                if(deckState.skills[i]) {
                    slot.innerHTML = `<img src="public/도감/캐릭터 스킬 모음/${deckState.skills[i]}.png" class="w-full h-full object-cover">`;
                } else { slot.innerHTML = ''; }
            }
        }

        // --- 덱 저장 및 리스트 ---
        window.saveDeck = async () => {
            const title = document.getElementById('deck-title').value;
            if(!title || deckState.heroes.length < 3) return alert("덱 이름과 영웅 3명 선택은 필수입니다.");
            const finalData = { ...deckState, title, type: document.getElementById('deck-type').value, speed: document.getElementById('speed-val').value, tip: document.getElementById('deck-tip').value, counterId: document.getElementById('counter-select').value, time: Date.now() };
            await push(ref(db, 'decks'), finalData);
            alert("가이드가 저장되었습니다.");
            location.reload();
        };

        window.loadDecks = (filter) => {
            onValue(ref(db, 'decks'), (snap) => {
                const container = document.getElementById('deck-list-container');
                const counterSel = document.getElementById('counter-select');
                container.innerHTML = ''; counterSel.innerHTML = '<option value="">지정 안 함</option>';
                if(!snap.exists()) return;
                allDecks = snap.val();
                
                Object.entries(allDecks).reverse().forEach(([id, d]) => {
                    // 카운터 선택지 추가
                    const opt = document.createElement('option'); opt.value = id; opt.text = d.title; counterSel.appendChild(opt);

                    if(filter !== '전체' && d.type !== filter) return;

                    const border = d.type === '공격덱' ? 'red-500' : (d.type === '방어덱' ? 'yellow-500' : 'green-500');
                    const banner = document.createElement('div');
                    banner.className = `p-4 bg-zinc-800 rounded-2xl border-l-4 border-${border} flex justify-between items-center shadow-lg active:scale-95 transition`;
                    banner.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="flex -space-x-3">
                                ${d.heroes.map(h => `<img src="public/도감/캐릭터 아이콘 모음/${h.name}.png" class="w-10 h-10 rounded-full border-2 border-zinc-800">`).join('')}
                            </div>
                            <div>
                                <div class="font-bold text-sm">${d.title}</div>
                                <div class="text-[9px] opacity-50">${d.type} | 속공 ${d.speed || 0}</div>
                            </div>
                        </div>
                        <span class="material-icons text-zinc-600">chevron_right</span>
                    `;
                    banner.onclick = () => viewDeck(id);
                    container.appendChild(banner);
                });
            });
        };

        window.viewDeck = (id) => {
            const d = allDecks[id];
            if(!confirm(`'${d.title}' 가이드를 보시겠습니까?`)) return;
            
            document.getElementById('view-title').innerText = d.title;
            document.getElementById('view-meta').innerText = `${d.type} | 속공 수치: ${d.speed || 0}`;
            document.getElementById('view-tip').innerText = d.tip || "입력된 공략 팁이 없습니다.";
            
            const hDiv = document.getElementById('view-heroes');
            hDiv.innerHTML = d.heroes.map(h => `<div class="text-center"><img src="public/도감/캐릭터 아이콘 모음/${h.name}.png" class="w-12 h-12 rounded-lg mb-1"><div class="text-[8px]">${h.name}</div></div>`).join('');
            
            const sDiv = document.getElementById('view-skills');
            sDiv.innerHTML = d.skills.map(s => `<img src="public/도감/캐릭터 스킬 모음/${s}.png" class="w-8 h-8 rounded border border-white/10">`).join('');
            
            const cDiv = document.getElementById('view-counter');
            if(d.counterId && allDecks[d.counterId]) {
                cDiv.innerHTML = `<h4 class="text-[10px] text-red-400 font-bold mb-1">상대하기 좋은 카운터덱</h4><div class="text-sm font-bold">${allDecks[d.counterId].title}</div>`;
            } else { cDiv.innerHTML = `<div class="text-xs text-zinc-600 italic">설정된 카운터덱 정보가 없습니다.</div>`; }

            document.getElementById('viewModal').style.display = 'block';
        };

        // --- 기타 ---
        window.setForm = (f, btn) => {
            document.body.className = `f-${f}`;
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active-form'));
            btn.classList.add('active-form'); deckState.formation = f;
        };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.openHeroDetail = (idx) => { if(deckState.heroes.find(h=>h.slot===idx)) document.getElementById('detailModal').style.display = 'block'; };
        window.openAdmin = () => alert("이옌 길드전 가이드 앱 v1.0\n모든 데이터는 실시간 파이어베이스에 동기화됩니다.");
    </script>
</body>
</html>
