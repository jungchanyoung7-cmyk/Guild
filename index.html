<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 MASTER - TOTAL DATA SPEC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0c1221; --card: #161b2d; --blue: #3b82f6; --purple: #8b5cf6; 
            --border: #2a2f3f; --text: #ffffff; --input: #1a1f2e; --red: #ef4444; --green: #10b981; --gold: #ffd700;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 12px; padding-bottom: 80px; }

        /* 배치 보드 및 슬롯 레이아웃 */
        .deck-board { position: relative; width: 100%; height: 420px; background: var(--card); border-radius: 24px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        .slot-container { position: absolute; width: 78px; height: 78px; transition: 0.4s; z-index: 10; }
        .slot { width: 100%; height: 100%; border-radius: 18px; border: 2px solid var(--border); overflow: hidden; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fallback-text { font-size: 10px; font-weight: bold; color: #666; z-index: 0; position: relative; text-align: center; line-height: 1.2; }
        .slot-num { position: absolute; top: -12px; left: -8px; font-weight: 900; font-size: 22px; text-shadow: 2px 2px 4px #000; z-index: 20; }
        .num-blue { color: var(--blue); } .num-red { color: var(--red); }
        .gear-badge { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); color: var(--gold); font-size: 9px; text-align: center; padding: 2px 0; font-weight: bold; z-index: 5; }

        /* 우측 고정 패널 (펫 & 스킬) */
        .right-panel { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .pet-circle { width: 62px; height: 62px; border: 3px solid var(--purple); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .skill-list-container { display: flex; flex-direction: column; gap: 5px; background: rgba(139,92,246,0.1); padding: 8px; border-radius: 15px; border: 2px solid var(--purple); cursor: pointer; }
        .sk-slot { width: 42px; height: 42px; background: #000; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 9px; position: relative; }

        /* 가이드 리스트 및 배너 디자인 */
        .list-item { padding: 18px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 12px; background: var(--card); }
        .speed-badge { display: flex; align-items: center; gap: 4px; color: var(--red); font-weight: 800; font-size: 14px; margin-top: 5px; }
        .strategy-box { margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; font-size: 13px; color: #aaa; border-left: 4px solid var(--purple); line-height: 1.5; }

        /* 입력 폼 공통 스타일 */
        .stat-input-main { width: 100%; padding: 12px; background: var(--input); color: var(--text); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; font-weight: bold; outline: none; }
        .btn-save { width: 100%; padding: 16px; background: var(--blue); border: none; border-radius: 12px; color: #fff; font-weight: 900; cursor: pointer; }

        /* 모달 및 사이드 메뉴 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 480px; border-radius: 24px; padding: 25px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--purple); }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--card); z-index: 6000; padding: 60px 20px; transition: 0.3s; border-left: 1px solid var(--border); overflow-y: auto; }
        .side-menu.open { right: 0; }
        
        /* 상세 스텟 그리드 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: var(--input); padding: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .stat-item input { width: 100%; background: none; border: none; color: #fff; font-weight: bold; outline: none; font-size: 14px; }
        .cat-btn { padding: 8px 12px; border-radius: 8px; background: #333; color: #fff; border: none; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--purple); font-weight: bold; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding:0 5px;">
        <div style="font-size:22px; font-weight:900;">이옌 MASTER</div>
        <div onclick="document.getElementById('side-menu').classList.toggle('open')" style="cursor:pointer; font-size:24px;">⚙️</div>
    </div>

    <div id="side-menu" class="side-menu">
        <h2 style="margin-bottom:20px; color:var(--purple);">ADMIN MENU</h2>
        <button onclick="clearGuides()" class="btn-save" style="background:var(--red); padding:10px; font-size:13px;">전체 가이드 초기화</button>
        <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;">
            <button onclick="location.reload()" class="btn-save" style="background:#333;">🔄 앱 새로고침</button>
        </div>
    </div>

    <div class="deck-board">
        <div class="right-panel">
            <div class="pet-circle" id="pet-view" onclick="openPet()"></div>
            <div class="skill-list-container" onclick="openSkill()">
                <div class="sk-slot" id="sk-0"></div>
                <div class="sk-slot" id="sk-1"></div>
                <div class="sk-slot" id="sk-2"></div>
            </div>
        </div>
        <div id="slots-area"></div>
    </div>

    <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border); margin-bottom:20px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="d-type" onchange="toggleCounterUI(this.value)" class="stat-input-main">
                <option value="공격">⚔️ 공격 가이드</option>
                <option value="방어">🛡️ 방어 가이드</option>
                <option value="카운터">🔥 카운터 가이드</option>
            </select>
            <input type="number" id="total-speed" placeholder="총 속공 수치" class="stat-input-main">
        </div>
        <div id="target-ui" style="display:none; margin-bottom:10px;">
            <select id="d-target" class="stat-input-main" onchange="showTargetPreview(this.value)"></select>
            <div id="target-preview" style="font-size:11px; color:#888; padding:5px;"></div>
        </div>
        <input type="text" id="d-name" placeholder="가이드 제목 입력" class="stat-input-main">
        <textarea id="d-tip" rows="3" placeholder="상세 전략 및 운영 팁을 입력하세요..." class="stat-input-main"></textarea>
        <button class="btn-save" onclick="saveGuide()">🚀 클라우드 발행</button>
    </div>

    <div id="guide-list"></div>

    <div id="modal" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-container"></div>
            <button onclick="closeM()" style="width:100%; margin-top:20px; padding:15px; background:var(--purple); border:none; border-radius:12px; color:#fff; font-weight:bold;">설정 완료</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BASE_URL = `https://raw.githubusercontent.com/jungchanyoung7-cmyk/Guild/main/public/%EB%8F%84%EA%B0%90`;

    // 💎 [데이터 로드] 영웅, 펫, 아이템 데이터 완전 통합
    const heroData = {
        "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
        "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
        "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
        "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
        "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
        "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
        "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
        "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
    };
    const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
    const itemData = {
        "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
        "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"]
    };

    const statNames = ["공격력", "방어력", "생명력", "속공", "치확", "치피", "약공", "막기", "효적", "효저"];
    let deck = [null,null,null,null,null], skills = [], pet = "", formation = '기본', curSlot = 0, guides = [];

    function init() {
        const area = document.getElementById('slots-area');
        for(let i=0; i<5; i++) area.innerHTML += `<div class="slot-container" id="wrap-${i}"><div class="slot-num" id="num-${i}">${i+1}</div><div class="slot" id="s-${i}" onclick="handleSlot(${i})"></div></div>`;
        setF('기본');
        db.ref('guides').on('value', snap => {
            guides = snap.val() ? Object.values(snap.val()).reverse() : [];
            renderGuides();
        });
    }

    function clearGuides() { if(confirm("모든 데이터를 초기화합니까?")) db.ref('guides').remove().then(()=>location.reload()); }

    function getImg(name, type='hero', sIdx=null) {
        if(!name) return "";
        let folder = type==='hero'?"캐릭터%20아이콘%20모음":type==='pet'?"펫%20아이콘%20모음":"캐릭터%20스킬%20모음";
        let suffix = sIdx===2?"-위":sIdx===3?"-아래":"";
        return `<span class="fallback-text">${name}${suffix}</span><img src="${BASE_URL}/${folder}/${encodeURIComponent(name+suffix)}.png" class="hero-img" onerror="this.style.display='none'">`;
    }

    // ⭐ [핵심] 영웅 선택 및 카테고리 필터링
    function handleSlot(i) {
        curSlot = i;
        if(!deck[i]) openHeroSelect('스페셜'); else openHeroDetail(i);
    }

    function openHeroSelect(cat) {
        let html = `<h3>영웅 선택</h3><div style="display:flex; gap:5px; overflow-x:auto; padding:10px 0; margin-bottom:15px; -webkit-overflow-scrolling: touch;">`;
        Object.keys(heroData).forEach(c => {
            html += `<button class="cat-btn ${c===cat?'active':''}" onclick="openHeroSelect('${c}')">${c}</button>`;
        });
        html += `</div><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">`;
        heroData[cat].forEach(n => {
            html += `<div class="slot" style="height:70px;" onclick="selectHero('${n}')">${getImg(n)}</div>`;
        });
        document.getElementById('modal-container').innerHTML = html + `</div>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function selectHero(n) { deck[curSlot] = {name:n, stats:new Array(10).fill(''), gear:'', acc:''}; updateUI(); closeM(); }

    // ⭐ [복구] 상세 설정 (장비 + 장신구 + 10종 스텟)
    function openHeroDetail(i) {
        const h = deck[i];
        let html = `<h3>${h.name} 상세 설정</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <select onchange="deck[${i}].gear=this.value" class="stat-input-main"><option value="">장비 선택</option>
                    ${itemData["장비"].map(g=>`<option value="${g}" ${h.gear===g?'selected':''}>${g}</option>`).join('')}</select>
                <select onchange="deck[${i}].acc=this.value" class="stat-input-main"><option value="">장신구 선택</option>
                    ${itemData["장신구"].map(a=>`<option value="${a}" ${h.acc===a?'selected':''}>${a}</option>`).join('')}</select>
            </div>
            <div class="stat-grid">`;
        statNames.forEach((n, idx) => {
            html += `<div class="stat-item"><div style="font-size:10px; color:#888;">${n}</div>
            <input type="number" value="${h.stats[idx]}" oninput="deck[${i}].stats[${idx}]=this.value"></div>`;
        });
        document.getElementById('modal-container').innerHTML = html + `</div><button onclick="deck[${i}]=null; updateUI(); closeM();" style="color:var(--red); border:none; background:none; margin-top:20px; font-weight:bold;">영웅 해제</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    // ⭐ 스킬 및 펫 선택 로직
    function openSkill() {
        const actives = deck.filter(h => h);
        if(!actives.length) return alert("영웅을 먼저 배치하세요.");
        let html = `<h3>스킬 순서 (최대 3개)</h3><button onclick="skills=[]; updateUI(); openSkill();" style="color:var(--red); background:none; border:none; margin-bottom:10px;">초기화</button><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
        actives.forEach(h => { [2,3].forEach(v => { html += `<div class="slot" style="height:75px;" onclick="addSkill('${h.name}',${v})">${getImg(h.name,'skill',v)}</div>`; })});
        document.getElementById('modal-container').innerHTML = html + `</div>`;
        document.getElementById('modal').style.display='flex';
    }
    function addSkill(n,v) { if(skills.length<3){ skills.push({n,v}); updateUI(); if(skills.length===3) closeM(); else openSkill(); } }

    function openPet() {
        let html = `<h3>펫 선택</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">`;
        petList.forEach(n => html += `<div class="slot" style="height:60px; border-radius:50%;" onclick="pet='${n}'; updateUI(); closeM();">${getImg(n,'pet')}</div>`);
        document.getElementById('modal-container').innerHTML = html + `</div>`;
        document.getElementById('modal').style.display='flex';
    }

    // ⭐ 가이드 발행 및 렌더링
    function saveGuide() {
        const name = document.getElementById('d-name').value;
        const speed = document.getElementById('total-speed').value;
        if(!name) return alert("제목을 입력하세요.");
        db.ref('guides').push({ name, speed, type:document.getElementById('d-type').value, tip:document.getElementById('d-tip').value, deck, skills, pet, formation, timestamp: Date.now() })
        .then(() => { alert("가이드 발행 완료!"); location.reload(); });
    }

    function renderGuides() {
        document.getElementById('guide-list').innerHTML = guides.map(g => `
            <div class="list-item" onclick="loadGuide(${g.timestamp})">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><div style="font-size:18px; font-weight:900;">${g.name}</div><div class="speed-badge">⚡ 속공 ${g.speed||0} ▲</div></div>
                    <div style="font-size:11px; color:var(--purple); font-weight:bold;">${g.type}</div>
                </div>
                <div class="strategy-box">${g.tip ? g.tip.replace(/\n/g, '<br>') : '운영 전략이 등록되지 않았습니다.'}</div>
            </div>`).join('');
    }

    function loadGuide(ts) {
        const g = guides.find(i => i.timestamp == ts);
        if(!g) return;
        deck = g.deck; skills = g.skills || []; pet = g.pet || ""; formation = g.formation || '기본';
        setF(formation); updateUI(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateUI() {
        deck.forEach((h, i) => {
            const s = document.getElementById('s-'+i);
            s.innerHTML = h ? getImg(h.name) + (h.gear?`<div class="gear-badge">${h.gear}</div>`:"") : "비었음";
        });
        document.getElementById('pet-view').innerHTML = pet ? getImg(pet, 'pet') : "펫";
        for(let j=0; j<3; j++) document.getElementById(`sk-${j}`).innerHTML = skills[j] ? getImg(skills[j].n, 'skill', skills[j].v) : "";
    }

    function setF(n) {
        const POS = {'기본': [{x:125,y:210,c:'blue'},{x:125,y:100,c:'blue'},{x:25,y:280,c:'red'},{x:25,y:170,c:'red'},{x:25,y:60,c:'red'}]};
        POS[n].forEach((p, i) => { 
            const el = document.getElementById(`wrap-${i}`); el.style.left = p.x+'px'; el.style.top = p.y+'px';
            document.getElementById(`num-${i}`).className = `slot-num num-${p.c}`;
        });
    }

    function toggleCounterUI(v) {
        document.getElementById('target-ui').style.display = (v==='카운터'?'block':'none');
        if(v==='카운터') {
            const defs = guides.filter(g => g.type === '방어');
            document.getElementById('d-target').innerHTML = defs.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
        }
    }

    function closeM() { document.getElementById('modal').style.display='none'; }
    window.onload = init;
</script>
</body>
</html>
