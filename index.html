<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드 - STRATEGY EDITION</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { 
            --bg: #0c1221; --card: #161b2d; --blue: #3b82f6; --purple: #8b5cf6; 
            --border: #2a2f3f; --text: #ffffff; --input: #1a1f2e; --red: #ef4444; --green: #10b981; --gold: #ffd700;
            --atk-bg: #2d1616; --def-bg: #162d1d; --cnt-bg: #2d2616;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 15px; min-height: 100vh; padding-bottom: 50px; }

        /* 헤더 및 레이아웃 */
        .top-bar { width: 100%; height: 60px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .guild-title { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--gold); }
        .menu-trigger { font-size: 26px; cursor: pointer; color: var(--text); }

        .formation-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .f-btn { padding: 10px 18px; background: var(--card); border: 1px solid var(--border); color: #888; border-radius: 10px; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* 메인 보드 디자인 */
        .deck-board { position: relative; width: 100%; height: 420px; background: var(--card); border-radius: 30px; border: 2px solid var(--border); margin-bottom: 25px; overflow: hidden; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
        .slot-container { position: absolute; width: 75px; height: 75px; transition: all 0.4s ease; z-index: 10; }
        .slot-num { position: absolute; top: -12px; left: -8px; z-index: 100; font-weight: 900; font-size: 20px; text-shadow: 1px 1px 3px #000; }
        .num-blue { color: var(--blue); } .num-red { color: var(--red); }   

        .slot { width: 100%; height: 100%; border-radius: 14px; border: 2px solid var(--border); overflow: hidden; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; position: relative; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .no-img-text { font-size: 9px; color: #aaa; text-align: center; font-weight: 800; line-height: 1.2; padding: 4px; }

        .right-panel { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .pet-circle { width: 65px; height: 65px; border: 3px solid var(--purple); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; }
        .skill-list-box { width: 110px; padding: 10px 5px; border: 2px solid var(--purple); border-radius: 15px; background: rgba(139,92,246,0.1); cursor: pointer; }
        .sk-slots { display: flex; justify-content: center; gap: 4px; margin-top: 5px; }
        .sk-mini-box { width: 30px; height: 30px; background: #000; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* 저장 패널 설정 */
        .save-panel { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input[type="text"], textarea, select { width: 100%; padding: 12px; background: var(--input); color: var(--text); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; outline: none; font-size: 13px; }
        #save-btn { background: var(--blue); color: #fff; padding: 15px; border: none; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }

        /* 리스트 아이템 스타일 */
        .list-item { padding: 15px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 12px; position: relative; transition: 0.2s; }
        .list-item.공격 { border-left: 6px solid var(--red); background: linear-gradient(90deg, var(--atk-bg), var(--card)); }
        .list-item.방어 { border-left: 6px solid var(--green); background: linear-gradient(90deg, var(--def-bg), var(--card)); }
        .list-item.카운터 { border-left: 6px solid var(--gold); background: linear-gradient(90deg, var(--cnt-bg), var(--card)); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .badge.speed { background: var(--purple); color: #fff; }
        .badge.solid { background: #555; color: #fff; }

        /* 모달 스타일 및 필터/즐겨찾기용 스타일 추가 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; border-radius: 25px; padding: 15px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--purple); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 5px; }
        .modal-title { font-size: 18px; font-weight: bold; color: #fff; }
        .close-btn { font-size: 24px; cursor: pointer; color: #888; }
        
        /* 스탯 그리드 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-item { background: var(--input); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: #888; }
        .stat-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; font-weight: bold; outline: none; }

        /* 탭 및 필터바 스타일 */
        .modal-filter-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 5px; background: var(--input); border-radius: 12px; }
        .search-input { width: 100%; padding: 10px; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; margin: 0; }
        .tab-container { overflow-x: auto; display: flex; gap: 4px; padding-bottom: 3px; scrollbar-width: none; }
        .tab-btn { padding: 8px 12px; background: var(--card); color: #888; border-radius: 8px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .tab-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
        .tab-btn.fav { border-color: var(--gold); color: var(--gold); font-weight: bold; }
        .tab-btn.fav.active { background: var(--gold); color: #000; }

        /* 즐겨찾기 별 버튼 */
        .fav-star { position: absolute; top: 2px; right: 2px; color: rgba(255,255,255,0.2); font-size: 14px; cursor: pointer; z-index: 5; transition: 0.2s; text-shadow: 0 0 3px #000; }
        .fav-star.active { color: var(--gold); opacity: 1; }

        /* 그리드 리스트 */
        .grid-list { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 5px; }

        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--card); z-index: 4000; transition: 0.3s; padding: 60px 20px; border-left: 1px solid var(--border); }
        .side-menu.active { right: 0; }
        .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3999; backdrop-filter: blur(3px); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="guild-title">이옌 길드</div>
        <div class="menu-trigger" onclick="toggleMenu()">☰</div>
    </div>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <div onclick="toggleTheme()" style="padding:15px; border-bottom:1px solid var(--border);">🌓 테마 변경</div>
        <div onclick="openAdmin()" style="padding:15px; border-bottom:1px solid var(--border);">⚙️ 데이터 관리 (1598)</div>
        <div onclick="localStorage.removeItem('SENA_DECKS'); location.reload();" style="padding:15px; color:var(--red);">🧹 저장된 덱 초기화</div>
        <div onclick="location.reload()" style="padding:15px;">🔄 새로고침</div>
    </div>

    <div class="formation-bar">
        <button class="f-btn active" onclick="setF('기본')">🛡️ 기본</button>
        <button class="f-btn" onclick="setF('밸런스')">⚖️ 밸런스</button>
        <button class="f-btn" onclick="setF('공격')">⚔️ 공격</button>
        <button class="f-btn" onclick="setF('보호')">💎 보호</button>
    </div>

    <div class="deck-board">
        <div class="right-panel">
            <div class="pet-circle" onclick="openPet()" id="pet-slot-view"></div>
            <div class="skill-list-box" onclick="openSkill()" id="sk-slots-view"></div>
        </div>
        <div id="slots-area"></div>
    </div>

    <div class="save-panel">
        <div class="option-grid">
            <select id="d-type" onchange="checkCounter(this.value)">
                <option value="공격">⚔️ 공격덱</option>
                <option value="방어">🛡️ 방어덱</option>
                <option value="카운터">🔥 카운터덱</option>
            </select>
            <select id="d-style">
                <option value="속공">⚡ 속공 위주</option>
                <option value="내실">💎 내실 위주</option>
            </select>
        </div>
        <select id="d-target" style="display:none; border-color:var(--gold);"></select>
        <input type="text" id="d-name" placeholder="가이드 덱 이름">
        <textarea id="d-tip" rows="2" placeholder="운영 팁 입력..."></textarea>
        <button id="save-btn" onclick="saveToDB()">💾 전략 가이드 저장</button>
    </div>

    <div id="deck-list"></div>

    <div id="modal" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-container"></div> <button onclick="closeM()" style="width:100%; margin-top:15px; padding:12px; background:var(--border); border:none; border-radius:12px; color:#fff; font-weight:bold; font-size:13px;">닫기</button>
        </div>
    </div>

<script>
    const USER_ID = "jungchanyoung7-cmyk"; 
    const BASE_URL = `https://raw.githubusercontent.com/${USER_ID}/Guild/main/public/%EB%8F%84%EA%B0%90`;

    // 영웅/펫 리스트 (원본 건들지 않음)
    const heroData = {
        "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
        "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
        "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
        "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
        "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
        "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
        "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
        "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
    };
    const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];
    const itemData = {
        "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
        "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"]
    };
    const STAT_LABELS = ["공격력(물리/마법)", "방어력", "생명력", "속공", "치명타 확률", "치명타 피해", "약점 공격 확률", "막기 확률", "받는 피해 감소", "효과 적중"];

    let deck = [null, null, null, null, null];
    let skills = [];
    let pet = "";
    let formation = '기본';
    let curSlot = 0;
    let pressTimer = null;

    // 즐겨찾기 상태 (로컬 스토리지)
    let favHeroes = JSON.parse(localStorage.getItem('FAV_HEROES') || '[]');
    let favPets = JSON.parse(localStorage.getItem('FAV_PETS') || '[]');

    function init() {
        const area = document.getElementById('slots-area');
        area.innerHTML = "";
        for(let i=0; i<5; i++) { area.innerHTML += `<div class="slot-container" id="wrap-${i}"><div class="slot-num" id="num-${i}">${i+1}</div><div class="slot" id="s-${i}" onmousedown="startP(${i})" onmouseup="endP(${i})" ontouchstart="startP(${i})" ontouchend="endP(${i})"></div></div>`; }
        setF('기본'); renderList(); updateUI();
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('side-menu').classList.contains('active')?'block':'none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function startP(i) { pressTimer = setTimeout(() => { if(deck[i]) openDetail(i); }, 600); }
    function endP(i) { clearTimeout(pressTimer); if(!deck[i]) { curSlot = i; openHero(); } else if(event.type === 'mouseup' || event.type === 'touchend') { if(confirm('해제할까요?')) { deck[i] = null; updateUI(); } } }

    // 이미지 로직 (원본 건들지 않음)
    function getSlotHTML(name, type='hero', sIdx=null) {
        if(!name) return "";
        let folder = type === 'hero' ? "캐릭터%20아이콘%20모음" : type === 'pet' ? "펫%20아이콘%20모음" : type === 'ring' ? "장신구" : "캐릭터%20스킬%20모음";
        let fileName = sIdx ? `${name}-${sIdx}` : name;
        const png = `${BASE_URL}/${folder}/${encodeURIComponent(fileName)}.png`;
        const jpg = `${BASE_URL}/${folder}/${encodeURIComponent(fileName)}.jpg`;
        const alt = sIdx ? `${name}-${sIdx==2?'위':'아래'}` : name;
        return `<img src="${png}" class="hero-img" onerror="this.onerror=null; this.src='${jpg}'; this.nextElementSibling.style.display='flex';"><div class="no-img-text" style="display:none; height:100%; align-items:center; justify-content:center;">${alt}</div>`;
    }

    // 모달 관리
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function checkCounter(val) { const d=JSON.parse(localStorage.getItem('SENA_DECKS')||'[]'); const t=document.getElementById('d-target'); if(val==='카운터'){t.style.display='block'; t.innerHTML=`<option value="">🎯 상성 덱 선택</option>`+d.map(x=>`<option value="${x.name}">${x.name}</option>`).join('');}else{t.style.display='none';} }

    // --- 강력해진 영웅/펫 선택 로직 (필터+즐겨찾기 추가, 원본 건들지 않음) ---

    // 영웅 모달 오픈 (필터/즐겨찾기 UI 포함)
    function openHero() {
        let cats = Object.keys(heroData);
        let html = `
            <div class="modal-header"><div class="modal-title">영웅 배치</div><div class="close-btn" onclick="closeM()">×</div></div>
            <div class="modal-filter-bar">
                <input type="text" id="hero-search" class="search-input" placeholder="영웅 이름 검색..." oninput="filterHeroes()">
                <div class="tab-container">
                    <button class="tab-btn fav" id="t-fav" onclick="renderHTab('★ 즐겨찾기')">★ 즐겨찾기</button>
                    ${cats.map(c => `<button class="tab-btn" id="t-${c}" onclick="renderHTab('${c}')">${c}</button>`).join('')}
                </div>
            </div>
            <div id="h-list" class="grid-list"></div>`;
        document.getElementById('modal-container').innerHTML = html;
        renderHTab(favHeroes.length > 0 ? "★ 즐겨찾기" : cats[0]); // 즐겨찾기 있으면 먼저 뚬
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('hero-search').focus();
    }

    // 영웅 탭/필터 렌더링
    function renderHTab(cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById(`t-${cat}`)) document.getElementById(`t-${cat}`).classList.add('active');
        document.getElementById('hero-search').value = ""; // 탭 이동 시 검색 초기화

        let targetList = [];
        if(cat === '★ 즐겨찾기') {
            targetList = favHeroes;
        } else {
            targetList = heroData[cat];
        }

        renderHGrid(targetList);
    }

    // 영웅 그리드 실제 생성
    function renderHGrid(list) {
        document.getElementById('h-list').innerHTML = list.map(n => `
            <div class="slot" style="height:65px;">
                <span class="fav-star ${favHeroes.includes(n)?'active':''}" onclick="toggleFav('hero', '${n}')">★</span>
                <div onclick="selH('${n}')" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    ${getSlotHTML(n)}
                </div>
            </div>`).join('');
    }

    // 영웅 검색 필터링
    function filterHeroes() {
        const keyword = document.getElementById('hero-search').value.trim();
        if(!keyword) {
            // 검색어 없으면 현재 활성화된 탭 다시 렌더링
            const activeTab = document.querySelector('.tab-btn.active');
            renderHTab(activeTab ? activeTab.innerText : Object.keys(heroData)[0]);
            return;
        }

        // 전체 탭 끄기
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        // 모든 영웅에서 검색
        const allHeroes = [...new Set(Object.values(heroData).flat())]; // 중복 제거
        const filtered = allHeroes.filter(n => n.includes(keyword));
        renderHGrid(filtered);
    }

    // 펫 모달 오픈 (필터/즐겨찾기 UI 포함)
    function openPet() {
        let html = `
            <div class="modal-header"><div class="modal-title">펫 선택</div><div class="close-btn" onclick="closeM()">×</div></div>
            <div class="modal-filter-bar">
                <input type="text" id="pet-search" class="search-input" placeholder="펫 이름 검색..." oninput="filterPets()">
                <div class="tab-container">
                    <button class="tab-btn fav ${favPets.length > 0 ? 'active' : ''}" id="t-p-fav" onclick="renderPTab('fav')">★ 즐겨찾기</button>
                    <button class="tab-btn ${favPets.length === 0 ? 'active' : ''}" id="t-p-all" onclick="renderPTab('all')">전체</button>
                </div>
            </div>
            <div id="p-list" class="grid-list"></div>`;
        document.getElementById('modal-container').innerHTML = html;
        renderPTab(favPets.length > 0 ? 'fav' : 'all');
        document.getElementById('modal').style.display = 'flex';
    }

    function renderPTab(type) {
        document.querySelectorAll('.modal-filter-bar .tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`t-p-${type}`).classList.add('active');
        document.getElementById('pet-search').value = "";

        let targetList = type === 'fav' ? favPets : petList;
        renderPGrid(targetList);
    }

    function renderPGrid(list) {
        document.getElementById('p-list').innerHTML = list.map(n => `
            <div class="slot" style="height:60px; border-radius:50%;">
                <span class="fav-star ${favPets.includes(n)?'active':''}" onclick="toggleFav('pet', '${n}')">★</span>
                <div onclick="selP('${n}')" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    ${getSlotHTML(n, 'pet')}
                </div>
            </div>`).join('');
    }

    function filterPets() {
        const keyword = document.getElementById('pet-search').value.trim();
        if(!keyword) {
            const activeTab = document.querySelector('.modal-filter-bar .tab-btn.active');
            renderPTab(activeTab.id === 't-p-fav' ? 'fav' : 'all');
            return;
        }
        document.querySelectorAll('.modal-filter-bar .tab-btn').forEach(b => b.classList.remove('active'));
        const filtered = petList.filter(n => n.includes(keyword));
        renderPGrid(filtered);
    }

    // 즐겨찾기 토글 로직
    function toggleFav(type, name) {
        event.stopPropagation(); // 슬롯 클릭 이벤트 방지
        if(type === 'hero') {
            if(favHeroes.includes(name)) favHeroes = favHeroes.filter(n => n !== name);
            else favHeroes.push(name);
            localStorage.setItem('FAV_HEROES', JSON.stringify(favHeroes));
            
            // 현재 화면 갱신 로직 (검색 중이면 검색결과 갱신, 아니면 탭 갱신)
            const searchInput = document.getElementById('hero-search');
            if(searchInput && searchInput.value) filterHeroes();
            else { const activeTab = document.querySelector('.tab-btn.active'); renderHTab(activeTab.innerText); }
        } else {
            if(favPets.includes(name)) favPets = favPets.filter(n => n !== name);
            else favPets.push(name);
            localStorage.setItem('FAV_PETS', JSON.stringify(favPets));
            
            const searchInput = document.getElementById('pet-search');
            if(searchInput && searchInput.value) filterPets();
            else { const activeTab = document.querySelector('.modal-filter-bar .tab-btn.active'); renderPTab(activeTab.id === 't-p-fav'?'fav':'all'); }
        }
    }

    function selH(n) { deck[curSlot]={name:n, gear:"성기사", ring:"불사의반지", stats:Array(10).fill("")}; updateUI(); closeM(); }
    function selP(n) { pet=n; updateUI(); closeM(); }

    // --- 기존 상세설정/진형/저장 로직 (전부 완벽보존) ---
    function openDetail(i) {
        curSlot=i; const h=deck[i]; if(!h.stats) h.stats=Array(10).fill("");
        let html=`<div style="margin-bottom:12px; display:grid; gap:6px;"><select onchange="deck[${i}].gear=this.value">${itemData.장비.map(g=>`<option value="${g}" ${h.gear===g?'selected':''}>${g}</option>`).join('')}</select><select onchange="deck[${i}].ring=this.value">${itemData.장신구.map(r=>`<option value="${r}" ${h.ring===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="stat-grid">`;
        STAT_LABELS.forEach((l,idx)=>html+=`<div class="stat-item"><div class="stat-label">${l}</div><input class="stat-input" value="${h.stats[idx]}" oninput="deck[${curSlot}].stats[${idx}]=this.value"></div>`);
        document.getElementById('modal-container').innerHTML=`<div class="modal-header"><div class="modal-title">${h.name} 상세설정</div></div>`+html+`</div>`;
        document.getElementById('modal').style.display='flex';
    }
    function updateUI() { deck.forEach((h, i)=> { document.getElementById('s-'+i).innerHTML = h?getSlotHTML(h.name):""; }); document.getElementById('pet-slot-view').innerHTML = getSlotHTML(pet, 'pet'); document.getElementById('sk-slots-view').innerHTML = skills.map(s => `<div class="sk-mini-box">${getSlotHTML(s.n, 'skill', s.v)}</div>`).join('') + '<div class="sk-mini-box"></div>'.repeat(3 - skills.length); }
    function setF(n) { const POS={'기본':[{x:135,y:230,c:'blue'},{x:135,y:115,c:'blue'},{x:25,y:300,c:'red'},{x:25,y:185,c:'red'},{x:25,y:70,c:'red'}],'밸런스':[{x:135,y:290,c:'blue'},{x:135,y:180,c:'blue'},{x:135,y:70,c:'blue'},{x:25,y:235,c:'red'},{x:25,y:125,c:'red'}],'공격':[{x:135,y:185,c:'blue'},{x:25,y:310,c:'red'},{x:25,y:225,c:'red'},{x:25,y:140,c:'red'},{x:25,y:55,c:'red'}],'보호':[{x:135,y:310,c:'blue'},{x:135,y:225,c:'blue'},{x:135,y:140,c:'blue'},{x:135,y:55,c:'blue'},{x:25,y:185,c:'red'}]}; document.querySelectorAll('.f-btn').forEach(b=>b.classList.toggle('active',b.innerText.includes(n))); POS[n].forEach((p,i)=>{const el=document.getElementById(`wrap-${i}`); el.style.left=p.x+'px';el.style.top=p.y+'px';document.getElementById(`num-${i}`).className=`slot-num num-${p.c}`;}); }
    function openSkill() { const actives=deck.filter(h=>h); if(!actives.length) return alert("배치된 영웅이 없습니다."); document.getElementById('modal-container').innerHTML=`<div class="modal-header"><div class="modal-title">스킬 순서 (최대3)</div></div><div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px;">`+actives.flatMap(h=>[2,3].map(v=>`<div class="slot" style="height:70px;" onclick="addSk('${h.name}',${v})">${getSlotHTML(h.name,'skill',v)}</div>`)).join('')+`</div>`; document.getElementById('modal').style.display='flex'; }
    function addSk(n,v) { if(skills.length < 3) skills.push({n,v}); updateUI(); closeM(); }
    function saveToDB() { const name=document.getElementById('d-name').value; if(!name) return alert("덱 이름을 입력하세요."); const data={id:Date.now(), name, type:document.getElementById('d-type').value, style:document.getElementById('d-style').value, target:document.getElementById('d-target').value, tip:document.getElementById('d-tip').value, deck:JSON.parse(JSON.stringify(deck)), skills:[...skills], pet, formation}; let db=JSON.parse(localStorage.getItem('SENA_DECKS')||'[]'); db.unshift(data); localStorage.setItem('SENA_DECKS',JSON.stringify(db)); renderList(); alert("저장되었습니다."); }
    function renderList() { const db=JSON.parse(localStorage.getItem('SENA_DECKS')||'[]'); document.getElementById('deck-list').innerHTML=db.map(d=>`<div class="list-item ${d.type}" onclick="loadD(${d.id})"><span class="badge ${d.style==='속공'?'speed':'solid'}">${d.style}</span><div style="font-weight:900;font-size:16px;">${d.name}</div>${d.target?`<div style="color:var(--gold);font-size:11px;font-weight:bold;margin-top:3px;">🎯 카운터: ${d.target}</div>`:''}<div style="font-size:12px;color:#aaa;margin-top:5px;">${d.tip||''}</div><button onclick="event.stopPropagation();delD(${d.id})" style="position:absolute;top:15px;right:15px;color:var(--red);border:none;background:none;font-weight:bold;">삭제</button></div>`).join(''); }
    function loadD(id) { const d=JSON.parse(localStorage.getItem('SENA_DECKS')).find(i=>i.id===id); if(confirm(`'${d.name}' 전략을 불러올까요?`)) { deck=d.deck; skills=d.skills; pet=d.pet; setF(d.formation); updateUI(); } }
    function delD(id) { if(confirm('삭제하시겠습니까?')) { let db=JSON.parse(localStorage.getItem('SENA_DECKS')).filter(i=>i.id!==id); localStorage.setItem('SENA_DECKS',JSON.stringify(db)); renderList(); } }
    function openAdmin() { if(prompt("비번")==="1598") alert("데이터 관리 권한 활성화"); }

    window.onload = init;
</script>
</body>
</html>
