<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드용 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --accent: #ff4d4d; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        
        /* 진형 슬롯 배치 (좌표 기준: 왼쪽 345, 오른쪽 12) */
        .slot { position: absolute; width: 70px; height: 100px; transition: all 0.5s ease-in-out; cursor: pointer; }
        .slot-img { width: 60px; height: 60px; background: #222; border: 2px solid #444; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .x-mark { background: rgba(0,0,0,0.6); border: 2px dashed #333; color: #555; }

        /* [수정] 진형별 좌표 정의 (요청하신 위치 반영) */
        /* 기본진형: 왼쪽(3,4,5), 오른쪽(1,2) */
        .f-basic .s1 { top: 40px; right: 20px; } .f-basic .s2 { top: 140px; right: 20px; }
        .f-basic .s3 { top: 10px; left: 20px; } .f-basic .s4 { top: 90px; left: 20px; } .f-basic .s5 { top: 170px; left: 20px; }

        /* 밸런스진형: 왼쪽(4,5), 오른쪽(1,2,3) */
        .f-balance .s1 { top: 10px; right: 20px; } .f-balance .s2 { top: 90px; right: 20px; } .f-balance .s3 { top: 170px; right: 20px; }
        .f-balance .s4 { top: 40px; left: 20px; } .f-balance .s5 { top: 140px; left: 20px; }

        /* 공격진형: 왼쪽(2,3,4,5), 오른쪽(1-가운데) */
        .f-attack .s1 { top: 90px; right: 30px; }
        .f-attack .s2 { top: 0px; left: 20px; } .f-attack .s3 { top: 60px; left: 20px; } .f-attack .s4 { top: 120px; left: 20px; } .f-attack .s5 { top: 180px; left: 20px; }

        /* 보호진형: 왼쪽(5-가운데), 오른쪽(1,2,3,4) */
        .f-protect .s1 { top: 0px; right: 20px; } .f-protect .s2 { top: 60px; right: 20px; } .f-protect .s3 { top: 120px; right: 20px; } .f-protect .s4 { top: 180px; right: 20px; }
        .f-protect .s5 { top: 90px; left: 30px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; max-height: 85vh; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        .active-btn { border: 2px solid var(--accent); color: var(--accent); background: #2d1010; }
    </style>
</head>
<body class="f-basic">

    <header class="p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="font-bold">이옌 길드전 가이드</h1>
        <span class="material-icons" onclick="openAdmin()">menu</span>
    </header>

    <main class="p-4 space-y-6">
        <div class="grid grid-cols-4 gap-1">
            <button class="form-btn active-btn p-2 text-[10px] rounded bg-zinc-800" onclick="setForm('basic', this)">기본진형</button>
            <button class="form-btn p-2 text-[10px] rounded bg-zinc-800" onclick="setForm('balance', this)">밸런스진형</button>
            <button class="form-btn p-2 text-[10px] rounded bg-zinc-800" onclick="setForm('attack', this)">공격진형</button>
            <button class="form-btn p-2 text-[10px] rounded bg-zinc-800" onclick="setForm('protect', this)">보호진형</button>
        </div>

        <div class="relative w-full h-[280px] bg-zinc-900 rounded-2xl border border-white/5 overflow-hidden shadow-2xl">
            <div id="slot-wrap">
                <div class="slot s1" onclick="handleSlotClick(1)"><div class="slot-img" id="img-1"></div><div class="text-[9px] text-center mt-1" id="name-1">1번</div></div>
                <div class="slot s2" onclick="handleSlotClick(2)"><div class="slot-img" id="img-2"></div><div class="text-[9px] text-center mt-1" id="name-2">2번</div></div>
                <div class="slot s3" onclick="handleSlotClick(3)"><div class="slot-img" id="img-3"></div><div class="text-[9px] text-center mt-1" id="name-3">3번</div></div>
                <div class="slot s4" onclick="handleSlotClick(4)"><div class="slot-img" id="img-4"></div><div class="text-[9px] text-center mt-1" id="name-4">4번</div></div>
                <div class="slot s5" onclick="handleSlotClick(5)"><div class="slot-img" id="img-5"></div><div class="text-[9px] text-center mt-1" id="name-5">5번</div></div>
            </div>
            <div class="absolute bottom-2 right-2" onclick="openSelect('pet')">
                <div id="pet-img" class="w-12 h-12 rounded-full border border-yellow-500 bg-black flex items-center justify-center overflow-hidden">
                    <span class="material-icons text-yellow-600">pets</span>
                </div>
            </div>
            <div id="deck-skills" class="absolute bottom-2 left-2 flex gap-1" onclick="openSkillModal()">
                <div class="w-8 h-8 bg-black border border-white/10 rounded overflow-hidden"></div>
                <div class="w-8 h-8 bg-black border border-white/10 rounded overflow-hidden"></div>
                <div class="w-8 h-8 bg-black border border-white/10 rounded overflow-hidden"></div>
            </div>
        </div>

        <div class="bg-zinc-900 p-4 rounded-xl space-y-3">
            <input type="text" id="deck-title" placeholder="덱 명칭" class="w-full bg-zinc-800 p-3 rounded-lg text-sm">
            <div class="grid grid-cols-2 gap-2">
                <select id="deck-type" class="bg-zinc-800 p-3 rounded-lg text-sm">
                    <option value="공격덱">공격덱</option>
                    <option value="방어덱">방어덱</option>
                    <option value="카운터덱">카운터덱</option>
                </select>
                <input type="number" id="speed-val" placeholder="속공수치" class="bg-zinc-800 p-3 rounded-lg text-sm">
            </div>
            <textarea id="deck-tip" placeholder="공략 팁 입력" class="w-full bg-zinc-800 p-3 rounded-lg text-sm h-20"></textarea>
            <button onclick="saveDeck()" class="w-full bg-red-600 p-4 rounded-xl font-bold active:bg-red-700">가이드덱 저장</button>
        </div>
    </main>

    <div id="selectModal" class="modal" onclick="closeModal('selectModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4" id="modal-title">항목 선택</h2>
            <input type="text" id="search" oninput="filterGrid()" placeholder="필터 검색..." class="w-full bg-zinc-800 p-3 rounded-lg mb-4">
            <div id="grid-container" class="grid grid-cols-4 gap-2"></div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="closeModal('detailModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="font-bold mb-4">영웅 상세 설정</h2>
            <div class="flex gap-4 mb-6">
                <div class="grid grid-cols-2 gap-1 w-28 h-28">
                    <div class="bg-zinc-800 rounded border border-white/5 flex items-center justify-center text-[8px]" onclick="openSelect('item', 'i0')">무기1</div>
                    <div class="bg-zinc-800 rounded border border-white/5 flex items-center justify-center text-[8px]" onclick="openSelect('item', 'i1')">무기2</div>
                    <div class="bg-zinc-800 rounded border border-white/5 flex items-center justify-center text-[8px]" onclick="openSelect('item', 'i2')">방어1</div>
                    <div class="bg-zinc-800 rounded border border-white/5 flex items-center justify-center text-[8px]" onclick="openSelect('item', 'i3')">방어2</div>
                </div>
                <div class="flex-1 bg-zinc-800 rounded flex flex-col items-center justify-center border border-blue-900" onclick="openSelect('acc')">
                    <span class="material-icons text-blue-500">diamond</span>
                    <span class="text-[10px]">장신구 선택</span>
                </div>
            </div>
            <div id="stat-list" class="grid grid-cols-2 gap-2 text-[10px]"></div>
            <button onclick="closeModal('detailModal')" class="w-full mt-6 bg-zinc-700 p-3 rounded-lg font-bold">상세 설정 완료</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBObWW-nQdRW7B_HB9O5lmCJFoVRUm-Ijs",
            authDomain: "guid-3755d.firebaseapp.com",
            databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "guid-3755d",
            storageBucket: "guid-3755d.firebasestorage.app",
            messagingSenderId: "397986674872",
            appId: "1:397986674872:web:71ec328badbbedc6d4dc4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 데이터베이스
        const heroes = ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사", "태오", "연희", "카일", "린", "에이스", "여포", "손오공", "카르마"];
        const pets = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리"];
        const stats = ["공격력", "방어력", "생명력", "속공", "치명확률", "치명피해", "약공확률", "막기확률", "피해감소", "효과적중", "효과저항"];

        let deckState = { formation: 'basic', selected: [], pet: null, details: {} };
        let activeSlot = null;

        // 초기화
        window.onload = () => {
            const statArea = document.getElementById('stat-list');
            stats.forEach(s => statArea.innerHTML += `<div><label class="opacity-40">${s}</label><input type="number" class="w-full bg-black p-1 rounded mt-0.5"></div>`);
            
            // 롱탭(꾹 누르기) 설정
            for(let i=1; i<=5; i++){
                let timer;
                const el = document.querySelector(`.s${i}`);
                el.addEventListener('touchstart', () => timer = setTimeout(() => openHeroDetail(i), 700));
                el.addEventListener('touchend', () => clearTimeout(timer));
                el.addEventListener('mousedown', () => timer = setTimeout(() => openHeroDetail(i), 700));
                el.addEventListener('mouseup', () => clearTimeout(timer));
            }
        };

        // [핵심] 슬롯 클릭 핸들러 (중복 방지 및 3개 제한 로직)
        window.handleSlotClick = (slotIdx) => {
            if(deckState.selected.length >= 3 && !deckState.selected.find(s => s.idx === slotIdx)) {
                return alert("영웅은 최대 3명까지만 배치 가능합니다.");
            }
            openSelect('hero', slotIdx);
        };

        window.openSelect = (type, idx = null) => {
            activeSlot = idx;
            document.getElementById('selectModal').style.display = 'block';
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            
            let data = (type === 'hero') ? heroes : (type === 'pet' ? pets : []);
            let folder = (type === 'hero') ? "캐릭터 아이콘 모음" : "펫 아이콘 모음";

            data.forEach(name => {
                // [수정] 중복 선택 방지
                if(type === 'hero' && deckState.selected.some(s => s.name === name)) return;

                const item = document.createElement('div');
                item.className = "text-center";
                item.innerHTML = `<div class="aspect-square bg-zinc-800 rounded-lg flex items-center justify-center overflow-hidden border border-white/5">
                    <img src="public/도감/${folder}/${name}.png" onerror="this.src='public/도감/${folder}/${name}.jpg'; this.onerror=function(){this.parentElement.innerText='${name}'}" class="w-full h-full object-cover">
                </div><div class="text-[8px] truncate mt-1">${name}</div>`;
                item.onclick = () => confirmSelect(type, name);
                grid.appendChild(item);
            });
        };

        function confirmSelect(type, name) {
            if(type === 'hero') {
                // 기존 슬롯 정보 있으면 제거 후 새로 추가
                deckState.selected = deckState.selected.filter(s => s.idx !== activeSlot);
                deckState.selected.push({ idx: activeSlot, name: name });
                
                updateSlotUI();
            } else if(type === 'pet') {
                deckState.pet = name;
                document.getElementById('pet-img').innerHTML = `<img src="public/도감/펫 아이콘 모음/${name}.png" class="w-full h-full object-cover">`;
            }
            closeModal('selectModal');
        }

        // [핵심] UI 업데이트 (3개 완료 시 나머지 X 표기)
        function updateSlotUI() {
            for(let i=1; i<=5; i++) {
                const imgBox = document.getElementById(`img-${i}`);
                const nameBox = document.getElementById(`name-${i}`);
                const hero = deckState.selected.find(s => s.idx === i);

                if(hero) {
                    imgBox.innerHTML = `<img src="public/도감/캐릭터 아이콘 모음/${hero.name}.png" class="w-full h-full object-cover">`;
                    imgBox.classList.remove('x-mark');
                    nameBox.innerText = hero.name;
                } else if(deckState.selected.length >= 3) {
                    // 3개 선택 완료 시 나머지 슬롯 X
                    imgBox.innerHTML = `<span class="material-icons text-zinc-700">close</span>`;
                    imgBox.classList.add('x-mark');
                    nameBox.innerText = "비활성";
                } else {
                    imgBox.innerHTML = '';
                    imgBox.classList.remove('x-mark');
                    nameBox.innerText = `${i}번`;
                }
            }
        }

        window.setForm = (f, btn) => {
            document.body.className = `f-${f}`;
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            deckState.formation = f;
        };

        window.openHeroDetail = (idx) => {
            const hero = deckState.selected.find(s => s.idx === idx);
            if(!hero) return alert("영웅을 먼저 선택해야 상세 설정이 가능합니다.");
            document.getElementById('detailModal').style.display = 'block';
        };

        window.saveDeck = async () => {
            const title = document.getElementById('deck-title').value;
            if(!title || deckState.selected.length < 3) return alert("덱 명칭 입력 및 영웅 3명 배치가 필요합니다.");
            await push(ref(db, 'guild_decks'), { ...deckState, title, type: document.getElementById('deck-type').value, speed: document.getElementById('speed-val').value, tip: document.getElementById('deck-tip').value });
            alert("가이드 저장 완료!");
            location.reload();
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.openAdmin = () => alert("관리자 메뉴 팝업 (데이터 초기화 등)");
    </script>
</body>
</html>
