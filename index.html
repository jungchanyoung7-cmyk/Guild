<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이옌 길드전 가이드 - FINAL EDITION</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { 
            --bg: #0c1221; --card: #161b2d; --blue: #3b82f6; --purple: #8b5cf6; 
            --border: #2a2f3f; --text: #ffffff; --input: #1a1f2e; --red: #ef4444; --green: #10b981; --gold: #ffd700;
        }
        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --blue: #2563eb; --purple: #7c3aed;
            --border: #e5e7eb; --text: #1f2937; --input: #f9fafb; --red: #dc2626; --green: #059669; --gold: #d97706;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 10px; min-height: 100vh; padding-bottom: 120px; transition: background 0.3s; }

        .top-bar { position: relative; width: 100%; height: 90px; margin-bottom: 20px; border-radius: 20px; overflow: hidden; display: flex; justify-content: space-between; align-items: flex-end; padding: 15px 20px; background: rgba(255,255,255,0.05); }
        .guild-title { z-index: 2; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--gold); }
        .made-by { z-index: 2; font-size: 11px; color: #ccc; }

        .formation-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .f-btn { padding: 12px 20px; background: var(--card); border: 1px solid var(--border); color: #777; border-radius: 12px; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        .deck-board { position: relative; width: 100%; height: 440px; background: var(--card); border-radius: 35px; border: 2px solid var(--border); margin-bottom: 20px; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.7); }
        .slot-container { position: absolute; width: 70px; height: 70px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .slot-num { position: absolute; top: -14px; left: -10px; z-index: 100; font-weight: 900; font-size: 22px; text-shadow: 2px 2px 5px #000; }
        .num-blue { color: var(--blue); } .num-red { color: var(--red); }   

        .slot { width: 100%; height: 100%; border-radius: 16px; border: 2px solid var(--border); overflow: hidden; background: rgba(255,255,255,0.02); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .no-img-text { font-size: 10px; color: #555; text-align: center; font-weight: 800; }

        .right-panel { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 200; }
        .pet-circle { width: 70px; height: 70px; border: 3px solid var(--purple); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .skill-list-box { width: 115px; padding: 12px 8px; border: 2px solid var(--purple); border-radius: 20px; background: rgba(139,92,246,0.1); cursor: pointer; }
        .sk-slots { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .sk-mini-box { width: 32px; height: 32px; background: #000; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }

        .save-panel { background: var(--card); padding: 22px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; flex-direction: column; gap: 14px; }
        .flex-row { display: flex; gap: 12px; }
        input, select, textarea { width: 100%; padding: 15px; background: var(--input); color: var(--text); border: 1px solid var(--border); border-radius: 14px; font-size: 15px; outline: none; }
        
        /* 덱 리스트 스타일 */
        .list-item { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 18px; position: relative; border-left: 12px solid var(--border); cursor: pointer; transition: 0.2s; }
        .list-item:active { transform: scale(0.98); }
        .type-banner { position: absolute; top: 0; right: 0; padding: 7px 20px; font-size: 12px; font-weight: 900; color: #fff; border-bottom-left-radius: 18px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(12px); }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; border-radius: 35px; padding: 30px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--purple); position: relative; }
        
        #save-btn { flex: 4; background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; padding: 18px; border: none; border-radius: 16px; font-weight: 900; cursor: pointer; }
        #reset-btn { flex: 1.2; background: #1e2536; color: var(--red); border: 1px solid var(--red); border-radius: 16px; font-weight: bold; cursor: pointer; }
        
        .tab-btn { padding: 10px 15px; background: var(--input); color: #888; border: 1px solid var(--border); border-radius: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

        .theme-trigger { position: fixed; bottom: 35px; left: 30px; background: var(--card); padding: 15px; border-radius: 50%; border: 1px solid var(--border); cursor: pointer; z-index: 500; font-size: 24px; }
        .admin-trigger { position: fixed; bottom: 35px; right: 30px; background: var(--card); padding: 18px 32px; border-radius: 60px; border: 2px solid var(--purple); color: var(--purple); font-size: 16px; font-weight: 900; cursor: pointer; z-index: 500; }
    </style>
</head>
<body class="dark-mode">

    <div class="top-bar">
        <div class="guild-title">이옌 길드</div> <div class="made-by">By 시원</div>
    </div>

    <div class="formation-bar" id="f-bar">
        <button class="f-btn active" onclick="setF('기본')">🛡️ 기본 진형</button>
        <button class="f-btn" onclick="setF('밸런스')">⚖️ 밸런스 진형</button>
        <button class="f-btn" onclick="setF('공격')">⚔️ 공격 진형</button>
        <button class="f-btn" onclick="setF('보호')">💎 보호 진형</button>
    </div>

    <div class="deck-board">
        <div class="right-panel">
            <div class="pet-circle" onclick="openPet()">
                <div id="pet-label" style="font-size:12px; color:var(--purple); font-weight:900;">PET</div>
                <div id="pet-slot-view" style="width:100%; height:100%;"></div>
            </div>
            <div class="skill-list-box" onclick="openSkill()">
                <div style="font-size:10px; color:var(--purple); text-align:center; font-weight:900;">SKILL ORDER</div>
                <div class="sk-slots" id="sk-slots-view"></div>
            </div>
        </div>
        <div id="slots-area"></div>
    </div>

    <div class="save-panel">
        <div class="flex-row">
            <input type="text" id="d-name" placeholder="가이드 덱 명칭">
            <select id="d-type" style="width:140px;">
                <option value="공격">⚔️ 공격용</option>
                <option value="방어">🛡️ 방어용</option>
                <option value="카운터">🔥 카운터</option>
            </select>
        </div>
        <textarea id="d-tip" rows="2" placeholder="운영 팁을 입력하세요..."></textarea>
        <div class="btn-group" style="display:flex; gap:12px;">
            <button id="reset-btn" onclick="resetInput()">🧹 초기화</button>
            <button id="save-btn" onclick="saveToDB()">💾 가이드 데이터 저장</button>
        </div>
    </div>

    <h3 style="margin: 20px 0 10px 10px; font-size: 18px; color: var(--purple);">저장된 덱 가이드</h3>
    <div id="deck-list"></div>

    <div id="modal" class="modal" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin-bottom:20px;">선택</h3>
            <div id="m-body"></div>
        </div>
    </div>

    <div class="theme-trigger" onclick="toggleTheme()">🌓</div>
    <div class="admin-trigger" onclick="openAdmin()">⚙️ ADMIN</div>

<script>
    const USER_ID = "jungchanyoung7-cmyk"; 
    const BASE_PATH = `https://raw.githubusercontent.com/${USER_ID}/Guild/main/public`;
    const ROOT_PATH = `${BASE_PATH}/${encodeURIComponent('도감')}`;

    const heroData = {
        "스페셜": ["루디", "아일린", "레이첼", "델론즈", "스파이크", "제이브", "크리스", "바네사"],
        "(구)세나": ["파이", "로지", "쥬리", "밀리아", "겔리두스", "항우", "우치"],
        "다크나이츠": ["팔라누스", "플라튼", "콜트", "브란즈&브란셀", "실베스타", "멜키르"],
        "사황/구사황": ["에이스", "여포", "손오공", "린", "카르마", "태오", "연희", "카일"],
        "나이트크로우": ["오를리", "타카", "칼 헤론", "아킬라"],
        "천상/심연": ["트루드", "프레이야", "미스트", "레긴레이프", "라드그리드", "이브", "바토리", "앤티", "쥬다스"],
        "아이사": ["리나", "풍연", "소이", "백각", "비담", "권호", "조운", "관우", "초선", "강재", "나타"],
        "일반/기타": ["세인", "밍", "루리", "니아", "에스파다", "지크", "룩", "챈슬러", "에반", "카린", "유리", "리"]
    };

    const petList = ["루", "이린", "리첼", "델로", "파이크", "맬패로", "유", "크리", "연지", "카람"];

    const itemData = {
        "장비": ["선봉장", "성기사", "추적자", "암살자", "수문장", "수호자", "복수자", "조율자", "주술사"],
        "장신구": ["가시반지", "공포의반지", "권능의반지", "기회의반지", "꿈의반지", "독사반지", "마법의반지", "메두사의반지", "번뜩이는반지", "보호의반지", "복수의반지", "부활의반지", "불사의반지", "샐러맨더의반지", "설원의반지", "수호의반지", "시간의반지", "자연의반지", "재앙의반지", "저주의반지", "저항의반지", "적중의반지", "죽음의반지", "집중의반지", "행운의반지"]
    };

    let deck = [null, null, null, null, null];
    let skills = [];
    let pet = "";
    let formation = '기본';
    let curSlot = 0;
    let pressTimer = null;

    function init() {
        const area = document.getElementById('slots-area');
        area.innerHTML = "";
        for(let i=0; i<5; i++) {
            area.innerHTML += `
                <div class="slot-container" id="wrap-${i}">
                    <div class="slot-num" id="num-${i}">${i+1}</div>
                    <div class="slot" id="s-${i}" 
                         onmousedown="startPress(${i})" onmouseup="endPress(${i})" 
                         ontouchstart="startPress(${i})" ontouchend="endPress(${i})"
                         oncontextmenu="return false;"></div>
                </div>`;
        }
        setF('기본');
        renderList();
        updateUI();
    }

    function startPress(i) { pressTimer = setTimeout(() => { if(deck[i]) openDetail(i); }, 700); }
    function endPress(i) {
        clearTimeout(pressTimer);
        if(!deck[i]) { curSlot = i; openHero(); }
        else if(event.type === 'mouseup' || event.type === 'touchend') {
            if(confirm(`${deck[i].name}을(를) 해제할까요?`)) { deck[i] = null; updateUI(); }
        }
    }

    function openDetail(i) {
        if(!deck[i]) return;
        curSlot = i;
        const h = deck[i];
        document.getElementById('m-title').innerText = `${h.name} 상세 정보`;
        document.getElementById('m-body').innerHTML = `
            <div style="display:flex; justify-content:center; margin-bottom:20px;">
                <div class="slot" style="width:100px; height:100px; border-radius:20px;">${getSlotHTML(h.name, 'hero')}</div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr; gap:15px;">
                <div style="background:var(--input); padding:15px; border-radius:15px;">
                    <div style="font-size:12px; color:#888; margin-bottom:8px;">무기/방어구 세트</div>
                    <select onchange="deck[${i}].gear=this.value">
                        <option value="선택안함">선택안함</option>
                        ${itemData.장비.map(g=>`<option value="${g}" ${h.gear===g?'selected':''}>${g}</option>`).join('')}
                    </select>
                </div>
                <div style="background:var(--input); padding:15px; border-radius:15px;">
                    <div style="font-size:12px; color:#888; margin-bottom:8px;">장신구(반지)</div>
                    <select onchange="deck[${i}].ring=this.value">
                        <option value="선택안함">선택안함</option>
                        ${itemData.장신구.map(r=>`<option value="${r}" ${h.ring===r?'selected':''}>${r}</option>`).join('')}
                    </select>
                </div>
            </div>
            <button onclick="closeM()" style="width:100%; margin-top:20px; padding:15px; background:var(--purple); border:none; border-radius:15px; color:#fff; font-weight:bold;">설정 완료</button>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function openHero() {
        document.getElementById('m-title').innerText = "영웅 선택";
        let tabs = `<div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; margin-bottom:15px; border-bottom:1px solid var(--border);">`;
        Object.keys(heroData).forEach(cat => tabs += `<button onclick="renderHeroTab('${cat}')" class="tab-btn" id="tab-${cat}">${cat}</button>`);
        tabs += `</div><div id="hero-tab-content" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>`;
        document.getElementById('m-body').innerHTML = tabs;
        renderHeroTab("스페셜");
        document.getElementById('modal').style.display = 'flex';
    }

    function renderHeroTab(cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        document.getElementById('hero-tab-content').innerHTML = heroData[cat].map(n => `<div class="slot" style="height:75px;" onclick="selectHero('${n}')">${getSlotHTML(n)}</div>`).join('');
    }

    function selectHero(name) { deck[curSlot] = { name: name, gear: "선택안함", ring: "선택안함" }; updateUI(); closeM(); }

    function getSlotHTML(name, type='hero', sIdx=null) {
        if(!name) return "";
        let cat = "일반/기타";
        for(let c in heroData) { if(heroData[c].includes(name)) cat = c; }
        if(petList.includes(name)) cat = "펫";
        let sub = type === 'hero' ? '아이콘' : (type === 'skill' ? '스킬' : '');
        let file = type === 'skill' ? `${name}-${sIdx}` : name;
        const url = `${ROOT_PATH}/${encodeURIComponent(cat)}/${sub?encodeURIComponent(sub)+'/':''}${encodeURIComponent(file)}.png`;
        return `<img src="${url}" class="hero-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div class="no-img-text" style="display:none;">${name}</div>`;
    }

    function updateUI() {
        deck.forEach((h, i) => { document.getElementById('s-' + i).innerHTML = h ? getSlotHTML(h.name) : ""; });
        document.getElementById('pet-slot-view').innerHTML = getSlotHTML(pet, 'pet');
        document.getElementById('pet-label').style.display = pet ? 'none' : 'block';
        document.getElementById('sk-slots-view').innerHTML = skills.map(s => `<div class="sk-mini-box">${getSlotHTML(s.n, 'skill', s.v)}</div>`).join('') + '<div class="sk-mini-box"></div>'.repeat(3 - skills.length);
    }

    function setF(n) {
        const POS = {
            '기본': [{x:135,y:250,c:'blue'},{x:135,y:130,c:'blue'},{x:25,y:320,c:'red'},{x:25,y:200,c:'red'},{x:25,y:80,c:'red'}],
            '밸런스': [{x:135,y:310,c:'blue'},{x:135,y:195,c:'blue'},{x:135,y:80,c:'blue'},{x:25,y:260,c:'red'},{x:25,y:145,c:'red'}],
            '공격': [{x:135,y:200,c:'blue'},{x:25,y:335,c:'red'},{x:25,y:245,c:'red'},{x:25,y:155,c:'red'},{x:25,y:65,c:'red'}],
            '보호': [{x:135,y:335,c:'blue'},{x:135,y:245,c:'blue'},{x:135,y:155,c:'blue'},{x:135,y:65,c:'blue'},{x:25,y:200,c:'red'}]
        };
        formation = n;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(n)));
        POS[n].forEach((p, i) => {
            const el = document.getElementById(`wrap-${i}`);
            el.style.left = p.x + 'px'; el.style.top = p.y + 'px';
            document.getElementById(`num-${i}`).className = `slot-num num-${p.c}`;
        });
    }

    // 덱 저장 로직 (카운터 타입 포함)
    function saveToDB() {
        const name = document.getElementById('d-name').value;
        if(!name) return alert("덱 이름을 입력하세요.");
        const type = document.getElementById('d-type').value;
        const data = { id: Date.now(), name, type, tip: document.getElementById('d-tip').value, deck: JSON.parse(JSON.stringify(deck)), skills: [...skills], pet, formation };
        let dbList = JSON.parse(localStorage.getItem('SENA_DECKS') || '[]');
        dbList.unshift(data);
        localStorage.setItem('SENA_DECKS', JSON.stringify(dbList));
        renderList(); alert(`${type} 덱 저장 완료!`);
    }

    // 덱 리스트 렌더링 및 카운터 설정 기능 (복구)
    function renderList() {
        const dbList = JSON.parse(localStorage.getItem('SENA_DECKS') || '[]');
        const listArea = document.getElementById('deck-list');
        listArea.innerHTML = dbList.map(d => {
            const typeColor = d.type === '공격' ? 'var(--red)' : (d.type === '카운터' ? 'var(--gold)' : 'var(--blue)');
            return `
            <div class="list-item" onclick="loadDeck(${d.id})" style="border-left-color:${typeColor}">
                <div class="type-banner" style="background:${typeColor}">${d.type}</div>
                <div style="font-weight:900; font-size:18px; margin-bottom:10px;">${d.name}</div>
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    ${d.deck.filter(h=>h).map(h=>`<div style="width:40px; height:40px; border-radius:8px; overflow:hidden; background:#000;">${getSlotHTML(h.name)}</div>`).join('')}
                </div>
                <div style="font-size:12px; color:#888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${d.tip || '팁 없음'}</div>
                <button onclick="event.stopPropagation(); deleteDeck(${d.id})" style="position:absolute; bottom:15px; right:15px; background:none; border:none; color:var(--red); font-size:12px; font-weight:bold;">삭제</button>
            </div>`;
        }).join('') || '<div style="text-align:center; padding:50px; color:#444;">저장된 데이터가 없습니다.</div>';
    }

    // 저장된 덱 불러오기
    function loadDeck(id) {
        const dbList = JSON.parse(localStorage.getItem('SENA_DECKS'));
        const target = dbList.find(i => i.id === id);
        if(!target) return;
        if(confirm(`'${target.name}' 덱을 불러오시겠습니까?`)) {
            deck = JSON.parse(JSON.stringify(target.deck));
            skills = [...target.skills];
            pet = target.pet;
            setF(target.formation);
            updateUI();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }

    function deleteDeck(id) { if(confirm("삭제할까요?")) { let dbList = JSON.parse(localStorage.getItem('SENA_DECKS')); dbList = dbList.filter(i=>i.id!==id); localStorage.setItem('SENA_DECKS', JSON.stringify(dbList)); renderList(); } }
    function openPet() {
        let html = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">`;
        petList.forEach(n => html += `<div class="slot" style="height:65px; border-radius:50%;" onclick="pet='${n}'; updateUI(); closeM();">${getSlotHTML(n, 'pet')}</div>`);
        document.getElementById('m-body').innerHTML = html + "</div>";
        document.getElementById('modal').style.display='flex';
    }
    function openSkill() {
        const actives = deck.filter(h=>h);
        if(!actives.length) return alert("영웅을 먼저 배치하세요.");
        let html = `<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;">`;
        actives.forEach(h => { [1,2].forEach(v => html += `<div class="slot" style="height:80px;" onclick="toggleSkill('${h.name}',${v})">${getSlotHTML(h.name,'skill',v)}</div>`); });
        document.getElementById('m-body').innerHTML = html + "</div>";
        document.getElementById('modal').style.display='flex';
    }
    function toggleSkill(n,v) { if(skills.length < 3) skills.push({n,v}); updateUI(); closeM(); }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function closeM() { document.getElementById('modal').style.display='none'; }
    function openAdmin() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
    function resetInput() { if(confirm("초기화할까요?")) { deck=[null,null,null,null,null]; skills=[]; pet=""; updateUI(); } }

    window.onload = init;
</script>
</body>
</html>
