<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이옌 길드전 가이드용 앱</title>

<style>
:root{
  --bg:#111;
  --card:#1e1e1e;
  --border:#444;
}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:sans-serif;
}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

.menu{
  position:absolute;
  right:10px;
  top:10px;
  font-size:20px;
}

.formations{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

.btn{
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:8px;
}
.btn.active{background:#00c853;}

.board{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.column{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.slot{
  width:70px;
  height:70px;
  border:2px solid var(--border);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--card);
  position:relative;
}

.slot img{
  width:100%;
  height:100%;
  border-radius:8px;
}

.locked::after{
  content:"X";
  color:red;
  font-size:20px;
}

.pet{
  text-align:center;
  margin-top:10px;
}

.popup, .detail{
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  max-height:70%;
  overflow:auto;
  display:none;
}

.item{
  padding:10px;
  border-bottom:1px solid #333;
}

.deck-list{
  margin-top:10px;
}

.deck-card{
  background:#222;
  padding:10px;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>이옌 길드전 가이드용 앱</header>
<div class="menu" onclick="toggleMode()">☰</div>

<div class="formations">
  <div class="btn active" onclick="setFormation('base')">기본</div>
  <div class="btn" onclick="setFormation('balance')">밸런스</div>
  <div class="btn" onclick="setFormation('attack')">공격</div>
  <div class="btn" onclick="setFormation('defense')">보호</div>
</div>

<div class="board">
  <div class="column" id="left"></div>
  <div class="column" id="right"></div>
</div>

<div class="pet">
  <div class="slot" onclick="openPopup('pet')">펫</div>
</div>

<div style="padding:10px">
  <input id="deckName" placeholder="덱 이름">
  <select id="deckType">
    <option>공격덱</option>
    <option>방어덱</option>
    <option>카운터덱</option>
  </select>
  <button onclick="saveDeck()">저장</button>
</div>

<div class="deck-list" id="deckList"></div>

<div class="popup" id="popup"></div>
<div class="detail" id="detail"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://guid-3755d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const heroData = {
 "스페셜":["루디","아일린","레이첼"],
 "일반":["세인","에반","카린"]
};

const petList=["루","이린","리첼"];

let selected = Array(5).fill(null);
let pet=null;
let currentSlot=null;

/* 슬롯 생성 */
function createSlots(){
  const left=document.getElementById("left");
  const right=document.getElementById("right");
  left.innerHTML=""; right.innerHTML="";

  let leftIdx=[2,3,4];
  let rightIdx=[0,1];

  leftIdx.forEach(i=>left.appendChild(makeSlot(i)));
  rightIdx.forEach(i=>right.appendChild(makeSlot(i)));
}

function makeSlot(i){
  const s=document.createElement("div");
  s.className="slot";
  s.onclick=()=>openPopup("hero",i);

  let pressTimer;
  s.onmousedown=()=>pressTimer=setTimeout(()=>openDetail(i),500);
  s.onmouseup=()=>clearTimeout(pressTimer);

  return s;
}

/* 진형 */
window.setFormation=(type)=>{
 document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");

 createSlots();
}

/* 팝업 */
window.openPopup=(type,i)=>{
 currentSlot=i;
 const popup=document.getElementById("popup");
 popup.innerHTML="";
 popup.style.display="block";

 let list = type==="hero"?Object.values(heroData).flat():petList;

 list.forEach(name=>{
   let d=document.createElement("div");
   d.className="item";
   d.innerText=name;
   d.onclick=()=>select(name,type);
   popup.appendChild(d);
 });
}

function imgPath(name,folder){
  return `https://raw.githubusercontent.com/jungchanyoung7-cmyk/Guild/main/public/도감/${folder}/${name}.png`;
}

/* 선택 */
function select(name,type){
 if(type==="hero"){
   if(selected.includes(name)) return alert("중복 불가");

   selected[currentSlot]=name;
   renderSlots();

   if(selected.filter(v=>v).length>=3){
     document.querySelectorAll(".slot").forEach((s,i)=>{
       if(!selected[i]) s.classList.add("locked");
     });
   }
 }

 if(type==="pet"){
   pet=name;
   document.querySelector(".pet .slot").innerText=name;
 }

 document.getElementById("popup").style.display="none";
}

/* 렌더 */
function renderSlots(){
 document.querySelectorAll(".slot").forEach((s,i)=>{
   if(selected[i]){
     s.innerHTML=`<img src="${imgPath(selected[i],'캐릭터 아이콘 모음')}"
     onerror="this.parentNode.innerText='${selected[i]}'">`;
   }
 });
}

/* 상세 */
function openDetail(i){
 const d=document.getElementById("detail");
 d.style.display="block";

 d.innerHTML=`
  <div class="item">상세설정 - ${selected[i]||"없음"}</div>
  <div class="item">공격력 <input></div>
  <div class="item">방어력 <input></div>
  <div class="item">생명력 <input></div>
  <div class="item">장비
    <div style="display:grid;grid-template-columns:1fr 1fr">
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
    </div>
  </div>
  <div class="item">장신구 <div class="slot"></div></div>
  <button onclick="this.parentNode.style.display='none'">닫기</button>
 `;
}

/* 저장 */
window.saveDeck=()=>{
 const name=document.getElementById("deckName").value;
 const type=document.getElementById("deckType").value;

 const data={name,type,heroes:selected,pet};

 set(ref(db,"deck/"+Date.now()),data);

 loadDecks();
}

/* 불러오기 */
async function loadDecks(){
 const snapshot=await get(ref(db,"deck"));
 const list=document.getElementById("deckList");
 list.innerHTML="";

 snapshot.forEach(child=>{
   let d=child.val();
   let card=document.createElement("div");
   card.className="deck-card";

   card.innerHTML=`
    <b>${d.name}</b> (${d.type})<br>
    ${d.heroes.join(",")}
   `;
   list.appendChild(card);
 });
}

function toggleMode(){
 document.body.classList.toggle("light");
}

/* 시작 */
createSlots();
loadDecks();

</script>

</body>
</html>
